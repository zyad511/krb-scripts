<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRB - مركز السكربتات | KSA Scripts Hub</title>
    <meta name="theme-color" content="#0a0a0a">
    <style>
        :root {
            --bg: #08080f;
            --card: #11111a;
            --card2: #181825;
            --border: #1e1e30;
            --border2: #2a2a42;
            --text: #e8e8f4;
            --sub: #8888a8;
            --accent: #a78bfa;
            --accent2: #7c3aed;
            --green: #34d399;
            --red: #f87171;
            --blue: #60a5fa;
            --gold: #fbbf24;
            --cyan: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

        /* HEADER */
        .header {
            background: rgba(8,8,15,0.95);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 1.8rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.9rem;
            font-weight: 900;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .logo-k { color: #fff; }
        .logo-r { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-b { background: linear-gradient(135deg, var(--gold), #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-sub { font-size: 0.55rem; color: var(--sub); display: block; letter-spacing: 3px; }

        .search-wrap {
            flex: 1;
            min-width: 260px;
            position: relative;
        }
        .search-wrap input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 30px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: #fff;
            font-size: 0.92rem;
            transition: all 0.3s;
        }
        .search-wrap input:focus {
            outline: none;
            border-color: var(--accent2);
            box-shadow: 0 0 0 4px rgba(124,58,237,0.12);
        }
        .search-wrap input::placeholder { color: var(--sub); }

        /* TABS */
        .tabs {
            display: flex;
            gap: 0.3rem;
            background: var(--card);
            padding: 0.25rem;
            border-radius: 30px;
            border: 1px solid var(--border);
        }
        .tab {
            padding: 0.5rem 1.2rem;
            border-radius: 27px;
            border: none;
            background: transparent;
            color: var(--sub);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .tab.active {
            background: var(--accent2);
            color: #fff;
            box-shadow: 0 4px 18px rgba(124,58,237,0.35);
        }
        .tab:hover:not(.active) { color: #fff; }

        /* CONTAINER */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem 1.8rem;
        }

        /* FILTERS */
        .filters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-bottom: 1.8rem;
            align-items: center;
        }
        .filter-label {
            font-size: 0.75rem;
            color: var(--sub);
            font-weight: 700;
            margin-left: 0.4rem;
            white-space: nowrap;
        }
        .filter-btn {
            padding: 0.45rem 1rem;
            border-radius: 25px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--sub);
            cursor: pointer;
            font-size: 0.76rem;
            font-weight: 600;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: var(--accent2);
            border-color: var(--accent2);
            color: #fff;
            box-shadow: 0 0 18px rgba(124,58,237,0.25);
        }
        .filter-btn:hover:not(.active) {
            border-color: var(--border2);
            color: #fff;
        }
        .sort-select {
            margin-right: auto;
            padding: 0.45rem 1rem;
            border-radius: 25px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: #fff;
            font-size: 0.76rem;
            font-weight: 600;
            cursor: pointer;
        }
        .sort-select option { background: var(--card); color: #fff; }

        /* STATS */
        .stats-bar {
            margin-bottom: 1.3rem;
            font-size: 0.84rem;
            color: var(--sub);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .count-badge {
            background: var(--accent2);
            color: #fff;
            padding: 0.2rem 0.8rem;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.78rem;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 1.1rem;
        }

        /* CARD */
        .card {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.35s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            border-color: var(--accent2);
            transform: translateY(-4px);
            box-shadow: 0 16px 45px rgba(124,58,237,0.12);
        }

        .card-img {
            position: relative;
            width: 100%;
            height: 175px;
            background: #050510;
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .card:hover .card-img img { transform: scale(1.06); }

        .card-badges {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.66rem;
            font-weight: 700;
            backdrop-filter: blur(8px);
        }
        .badge-key { background: rgba(248,113,113,0.9); color: #fff; }
        .badge-nokey { background: rgba(52,211,153,0.9); color: #000; }
        .badge-premium { background: rgba(251,191,36,0.9); color: #000; }
        .badge-mobile { background: rgba(96,165,250,0.9); color: #fff; }
        .badge-patched { background: rgba(148,163,184,0.8); color: #fff; }
        .badge-source {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            color: #fff;
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
        }

        .card-body {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .card-title {
            font-size: 0.93rem;
            font-weight: 700;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .card-desc {
            font-size: 0.76rem;
            color: var(--sub);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
            transition: all 0.3s;
        }
        .card-desc.translated {
            color: #d4c8f0;
            border-right: 3px solid var(--accent);
            padding-right: 0.5rem;
            background: rgba(124,58,237,0.06);
            border-radius: 0 8px 8px 0;
            padding: 0.3rem 0.5rem;
        }

        .btn-translate {
            font-size: 0.68rem;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1.5px solid var(--border2);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s;
            align-self: flex-start;
        }
        .btn-translate:hover {
            background: rgba(124,58,237,0.15);
            border-color: var(--accent);
        }
        .btn-translate:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-translate.done {
            background: rgba(52,211,153,0.12);
            border-color: var(--green);
            color: var(--green);
        }

        .card-game { font-size: 0.74rem; }
        .card-game a { color: var(--cyan); text-decoration: none; font-weight: 600; }
        .card-game a:hover { text-decoration: underline; color: #fff; }

        .card-dev {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }
        .card-dev img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border2);
        }
        .card-dev .dev-name {
            font-size: 0.78rem;
            font-weight: 600;
        }
        .dev-check { color: var(--blue); margin-left: 3px; }

        .card-stats {
            display: flex;
            gap: 0.8rem;
            font-size: 0.74rem;
            color: var(--sub);
        }
        .stat-v { color: var(--cyan); }
        .stat-l { color: #f472b6; }

        .card-tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .ctag {
            font-size: 0.6rem;
            padding: 2px 7px;
            border-radius: 6px;
            background: rgba(255,255,255,0.03);
            color: var(--sub);
            border: 1px solid var(--border);
        }

        .btn-copy {
            width: 100%;
            padding: 0.65rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent2), #6d28d9);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.84rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            margin-top: auto;
        }
        .btn-copy:hover {
            box-shadow: 0 6px 25px rgba(124,58,237,0.4);
        }
        .btn-copy:active { transform: scale(0.97); }
        .btn-copy.copied { background: var(--green) !important; }
        .btn-copy:disabled { opacity: 0.5; cursor: not-allowed; }

        /* LOAD MORE */
        .load-more-wrap { text-align: center; margin: 2.5rem 0; }
        .btn-more {
            padding: 0.75rem 3rem;
            border-radius: 30px;
            border: 2px solid var(--accent2);
            background: transparent;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.35s;
        }
        .btn-more:hover {
            background: var(--accent2);
            color: #fff;
            box-shadow: 0 8px 30px rgba(124,58,237,0.3);
        }
        .btn-more:disabled { opacity: 0.3; cursor: not-allowed; }

        /* SKELETON */
        .skel {
            background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
            height: 420px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent2);
            color: #fff;
            padding: 0.65rem 1.5rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.84rem;
            z-index: 9999;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            animation: toastUp 0.3s ease;
        }
        @keyframes toastUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--sub);
            font-size: 0.74rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 768px) {
            .header-inner { flex-direction: column; align-items: stretch; }
            .grid { grid-template-columns: 1fr; }
            .card-img { height: 155px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-k">K</span><span class="logo-r">R</span><span class="logo-b">B</span>
                <span class="logo-sub">SCRIPTS HUB</span>
            </div>
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="🔍 ابحث بأي لغة... (Blox Fruits, بلوكس فروت, บล็อกผลไม้...)" autocomplete="off">
            </div>
            <div class="tabs" id="tabs">
                <button class="tab active" data-source="all">🌐 الكل</button>
                <button class="tab" data-source="rscripts">📜 Rscripts</button>
                <button class="tab" data-source="bloxscript">📦 ScriptBlox</button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <div class="container">
        <!-- FILTERS -->
        <div class="filters-row" id="filtersRow">
            <span class="filter-label">🎯 تصفية:</span>
            <button class="filter-btn active" data-filter="all">✨ الكل</button>
            <button class="filter-btn" data-filter="free">🆓 مجاني</button>
            <button class="filter-btn" data-filter="nokey">🔓 بدون مفتاح</button>
            <button class="filter-btn" data-filter="key">🔑 بمفتاح</button>
            <button class="filter-btn" data-filter="mobile">📱 للجوال</button>
            <button class="filter-btn" data-filter="unpatched">🟢 يعمل</button>
            <button class="filter-btn" data-filter="verified">✅ موثق</button>
            <select class="sort-select" id="sortSelect">
                <option value="default">🔥 الأكثر تداولاً</option>
                <option value="newest">📅 الأحدث</option>
                <option value="views">👁️ الأكثر مشاهدة</option>
                <option value="likes">❤️ الأكثر إعجاباً</option>
            </select>
        </div>

        <!-- STATS -->
        <div class="stats-bar" id="statsBar">⏳ جاري تحميل السكربتات...</div>

        <!-- GRID -->
        <div class="grid" id="grid"></div>

        <!-- LOAD MORE -->
        <div class="load-more-wrap">
            <button class="btn-more" id="btnMore" style="display:none;">📥 تحميل المزيد من السكربتات</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p><strong style="color:#fff;">KRB</strong> — مركز السكربتات | Powered by 
           <a href="https://scriptblox.com" target="_blank">ScriptBlox</a> &amp; 
           <a href="https://rscripts.net" target="_blank">Rscripts</a>
        </p>
        <p style="margin-top:0.3rem;">© 2025 KRB Scripts Hub</p>
    </footer>

    <!-- TOAST -->
    <div id="toastEl" class="toast" style="display:none;"></div>

    <!-- ==================== ENGINE ==================== -->
    <script>
    (function() {
        // STATE
        const S = {
            src: 'all', filter: 'all', sort: 'default', qRaw: '', qEn: '',
            pR: 1, pB: 1, maxR: 1, maxB: 1,
            moreR: true, moreB: true, busy: false,
            scripts: [], timer: null
        };

        const grid = document.getElementById('grid');
        const search = document.getElementById('searchInput');
        const stats = document.getElementById('statsBar');
        const btnM = document.getElementById('btnMore');
        const toastEl = document.getElementById('toastEl');

        // ========== GOOGLE TRANSLATE (ANY LANGUAGE → ENGLISH) ==========
        const trCache = {};
        async function translateAnyToEnglish(text) {
            if (!text || text.length < 1) return '';
            // If already English, return as is
            if (/^[a-zA-Z0-9\s.,!?\-+=\[\]{}'"<>:;@#$%^&*()_/\\]+$/.test(text) && !/[^\x00-\x7F]/.test(text)) {
                return text;
            }
            const key = `toen_${text.substring(0, 80)}`;
            if (trCache[key]) return trCache[key];
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                const r = await fetch(url);
                if (!r.ok) throw new Error('Translate failed');
                const d = await r.json();
                let translated = d?.[0]?.map(p => p[0]).join('') || text;
                if (translated && translated !== text) {
                    trCache[key] = translated;
                }
                return translated;
            } catch {
                return text;
            }
        }

        // ========== TRANSLATE TEXT TO ARABIC (FOR DESCRIPTIONS) ==========
        async function translateToArabic(text) {
            if (!text || text.length < 3) return text;
            const key = `toar_${text.substring(0, 60)}`;
            if (trCache[key]) return trCache[key];
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ar&dt=t&q=${encodeURIComponent(text)}`;
                const r = await fetch(url);
                if (!r.ok) throw new Error('Translate failed');
                const d = await r.json();
                let translated = d?.[0]?.map(p => p[0]).join('') || text;
                if (translated !== text) trCache[key] = translated;
                return translated;
            } catch {
                return text;
            }
        }

        // ========== URL BUILDERS ==========
        function urlR(trend) {
            if (trend && !S.qEn) return 'https://rscripts.net/api/v2/trending';
            const p = new URLSearchParams();
            p.set('page', S.pR); p.set('sort', 'desc');
            if (S.sort === 'newest') p.set('orderBy','date');
            else if (S.sort === 'views') p.set('orderBy','views');
            else if (S.sort === 'likes') p.set('orderBy','likes');
            else p.set('orderBy','date');
            if (S.qEn) p.set('q', S.qEn);
            if (S.filter === 'nokey') p.set('noKeySystem','true');
            if (S.filter === 'mobile') p.set('mobileOnly','true');
            if (S.filter === 'free') p.set('notPaid','true');
            if (S.filter === 'unpatched') p.set('unpatched','true');
            if (S.filter === 'verified') p.set('verifiedOnly','true');
            return `https://rscripts.net/api/v2/scripts?${p}`;
        }

        function urlB(trend) {
            if (trend && !S.qEn) return 'https://scriptblox.com/api/script/trending';
            const ep = S.qEn ? '/script/search' : '/script/fetch';
            const p = new URLSearchParams();
            p.set('page', S.pB); p.set('max', '40');
            if (S.qEn) p.set('q', S.qEn);
            if (S.sort === 'newest') { p.set('sortBy','createdAt'); p.set('order','desc'); }
            else if (S.sort === 'views') { p.set('sortBy','views'); p.set('order','desc'); }
            else if (S.sort === 'likes') { p.set('sortBy','likeCount'); p.set('order','desc'); }
            if (S.filter === 'free') p.set('mode','free');
            if (S.filter === 'nokey') p.set('key','0');
            if (S.filter === 'key') p.set('key','1');
            if (S.filter === 'verified') p.set('verified','1');
            if (S.filter === 'unpatched') p.set('patched','0');
            return `https://scriptblox.com/api${ep}?${p}`;
        }

        // ========== NORMALIZERS ==========
        function nR(s) {
            const u = s.user && Object.keys(s.user).length > 0;
            return {
                id: s._id||'', title: s.title||'بدون عنوان', desc: (s.description||'').trim(),
                img: s.image||s.game?.imgurl||'',
                dev: u ? (s.user.username||'') : (s.creator||'مجهول'),
                devImg: u ? (s.user.image||'') : '',
                devV: u ? (s.user.verified||false) : false,
                views: s.views||0, likes: s.likes||0, dislikes: s.dislikes||0,
                key: s.keySystem||false, paid: s.paid||false,
                mobile: s.mobileReady||false, patched: false,
                game: s.game?.title||'',
                gameUrl: s.game?.gameLink||(s.game?.placeId?`https://roblox.com/games/${s.game.placeId}`:''),
                codeUrl: s.rawScript||null, code: null, tags: [], source: 'rscripts'
            };
        }

        function nB(s) {
            return {
                id: s._id||'', title: s.title||'بدون عنوان', desc: (s.features||'').trim(),
                img: s.image||'',
                dev: s.owner?.username||'مجهول',
                devImg: s.owner?.profilePicture||'',
                devV: s.owner?.verified||s.verified||false,
                views: s.views||0, likes: s.likeCount||0, dislikes: s.dislikeCount||0,
                key: s.key||false, paid: s.scriptType==='paid',
                mobile: false, patched: s.isPatched||false,
                game: s.game?.name||'',
                gameUrl: s.game?.gameId?`https://roblox.com/games/${s.game.gameId}`:'',
                code: s.script||null, tags: Array.isArray(s.tags)?s.tags:[], source: 'bloxscript'
            };
        }

        // ========== FETCH ==========
        async function fR(trend) {
            try {
                const r = await fetch(urlR(trend));
                const d = await r.json();
                let sc = [];
                if (trend && !S.qEn) { if (d.success) sc = d.success; }
                else if (d.scripts) sc = d.scripts;
                S.maxR = d.info?.maxPages || 1;
                S.moreR = S.pR < S.maxR;
                return sc.map(nR);
            } catch { return []; }
        }

        async function fB(trend) {
            try {
                const r = await fetch(urlB(trend));
                const d = await r.json();
                let sc = d.result?.scripts || [];
                S.maxB = d.result?.totalPages || 1;
                S.moreB = S.pB < S.maxB;
                return sc.map(nB);
            } catch { return []; }
        }

        // ========== GET CODE ==========
        const codeCache = {};
        async function getCode(sc) {
            const k = `${sc.source}_${sc.id}`;
            if (codeCache[k]) return codeCache[k];
            if (sc.code) { codeCache[k] = sc.code; return sc.code; }
            if (sc.source === 'rscripts' && sc.codeUrl) {
                try { const r = await fetch(sc.codeUrl); if(r.ok){const t=await r.text();codeCache[k]=t;return t;} } catch {}
                try { const r = await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(sc.codeUrl)); if(r.ok){const t=await r.text();codeCache[k]=t;return t;} } catch {}
            }
            if (sc.source === 'bloxscript') {
                try { const r = await fetch(`https://scriptblox.com/api/script/raw/${sc.id}`); if(r.ok){const t=await r.text();codeCache[k]=t;return t;} } catch {}
            }
            return null;
        }

        // ========== LOCAL FILTER ==========
        function localFilter(arr) {
            if (S.filter === 'all') return arr;
            return arr.filter(s => {
                switch(S.filter) {
                    case 'free': return !s.paid && !s.key;
                    case 'nokey': return !s.key;
                    case 'key': return s.key;
                    case 'mobile': return s.mobile;
                    case 'unpatched': return !s.patched;
                    case 'verified': return s.devV;
                    default: return true;
                }
            });
        }

        // ========== LOAD ==========
        async function load(reset=true) {
            if (S.busy) return;
            S.busy = true;

            if (reset) {
                S.pR = 1; S.pB = 1; S.moreR = true; S.moreB = true; S.scripts = [];
                grid.innerHTML = Array(12).fill('<div class="skel"></div>').join('');
                btnM.style.display = 'none';
            }

            btnM.disabled = true;
            const trend = S.sort === 'default' && !S.qEn;
            let all = [];

            if (S.src === 'all' || S.src === 'rscripts') all.push(...(await fR(trend)));
            if (S.src === 'all' || S.src === 'bloxscript') all.push(...(await fB(trend)));

            all = localFilter(all);

            if (S.sort === 'views') all.sort((a,b) => b.views - a.views);
            else if (S.sort === 'likes') all.sort((a,b) => b.likes - a.likes);

            if (reset) S.scripts = all;
            else S.scripts = [...S.scripts, ...all];

            // Dedupe
            S.scripts = S.scripts.filter((s,i,a) => a.findIndex(x=>x.id===s.id&&x.source===s.source)===i);

            render();
            const more = S.src==='all' ? (S.moreR||S.moreB) : (S.src==='rscripts'?S.moreR:S.moreB);
            btnM.style.display = more ? 'inline-block' : 'none';
            btnM.disabled = false;
            stats.innerHTML = `✅ تم العثور على <span class="count-badge">${S.scripts.length}</span> سكربت`;
            S.busy = false;
        }

        function loadMore() {
            if (S.src === 'all') { if(S.moreR) S.pR++; if(S.moreB) S.pB++; }
            else if (S.src === 'rscripts') S.pR++;
            else S.pB++;
            load(false);
        }

        // ========== RENDER ==========
        function render() {
            if (!S.scripts.length) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--sub);"><div style="font-size:4rem;">🔍</div><p style="font-size:1.2rem;">لا توجد نتائج</p><p>جرب تغيير الفلاتر أو البحث بكلمة مختلفة</p></div>`;
                return;
            }

            grid.innerHTML = S.scripts.map(s => {
                const desc = s.desc?.substring(0,200)||'';
                const hasDesc = desc.length > 10;
                const isEng = /^[a-zA-Z]/.test(desc);
                const uid = `${s.source}_${s.id}`.replace(/[^a-zA-Z0-9]/g,'_');

                const badges = [
                    s.key ? `<span class="badge badge-key">🔑 بمفتاح</span>` : `<span class="badge badge-nokey">🔓 بدون مفتاح</span>`,
                    s.paid ? `<span class="badge badge-premium">💎 مدفوع</span>` : '',
                    s.mobile ? `<span class="badge badge-mobile">📱 جوال</span>` : '',
                    s.patched ? `<span class="badge badge-patched">🚫 متوقف</span>` : '',
                ].filter(Boolean).join('');

                const translateBtn = hasDesc && isEng
                    ? `<button class="btn-translate" onclick="window._tr(this,'${uid}')">🌐 ترجمة الوصف</button>`
                    : '';

                return `
                <div class="card">
                    <div class="card-img">
                        ${s.img ? `<img src="${esc(s.img)}" loading="lazy" onerror="this.style.display='none'">` : ''}
                        <div class="card-badges">${badges}</div>
                        <span class="badge badge-source">${s.source==='rscripts'?'📜 Rscripts':'📦 ScriptBlox'}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-title">${esc(s.title)}</div>
                        ${hasDesc ? `<div class="card-desc" id="desc-${uid}" data-orig="${esc(desc)}">${esc(desc)}</div>` : ''}
                        ${translateBtn}
                        ${s.game ? `<div class="card-game">🎮 <a href="${esc(s.gameUrl)}" target="_blank">${esc(s.game)}</a></div>` : ''}
                        ${s.tags.length ? `<div class="card-tags-list">${s.tags.slice(0,5).map(t=>`<span class="ctag">#${esc(t)}</span>`).join('')}</div>` : ''}
                        <div class="card-dev">
                            ${s.devImg ? `<img src="${esc(s.devImg)}" onerror="this.style.display='none'">` : ''}
                            <span class="dev-name">${s.devV?'<span class="dev-check">✅</span> ':''}${esc(s.dev)}</span>
                        </div>
                        <div class="card-stats">
                            <span class="stat-v">👁️ ${fmt(s.views)}</span>
                            <span class="stat-l">❤️ ${fmt(s.likes)}</span>
                        </div>
                        <button class="btn-copy" onclick="window._cp(this,'${esc(s.id)}','${s.source}')">📋 نسخ السكربت</button>
                    </div>
                </div>`;
            }).join('');
        }

        // ========== TRANSLATE DESCRIPTION ==========
        window._tr = async function(btn, uid) {
            if (btn.disabled) return;
            const el = document.getElementById(`desc-${uid}`);
            if (!el) return;
            const orig = el.dataset.orig || el.textContent;
            btn.innerHTML = '⏳...';
            btn.disabled = true;
            const translated = await translateToArabic(orig);
            if (translated && translated !== orig) {
                el.textContent = translated;
                el.classList.add('translated');
                btn.innerHTML = '✅ تمت الترجمة';
                btn.classList.add('done');
                toast('✅ تمت ترجمة الوصف');
            } else {
                btn.innerHTML = '⚠️ فشل';
                toast('⚠️ تعذرت الترجمة');
            }
            setTimeout(() => {
                btn.innerHTML = btn.classList.contains('done') ? '🔄 إعادة' : '🌐 ترجمة الوصف';
                btn.disabled = false;
            }, 2000);
        };

        // ========== COPY ==========
        window._cp = async function(btn, id, source) {
            if (btn.disabled) return;
            const origHTML = btn.innerHTML;
            btn.innerHTML = '⏳...';
            btn.disabled = true;
            const sc = S.scripts.find(s => s.id === id && s.source === source);
            if (!sc) { btn.innerHTML = origHTML; btn.disabled = false; return; }
            const code = await getCode(sc);
            if (code) {
                try { await navigator.clipboard.writeText(code); btn.innerHTML = '✅ تم النسخ!'; btn.classList.add('copied'); toast('✅ تم نسخ السكربت!'); }
                catch { btn.innerHTML = '❌ فشل'; toast('❌ تعذر النسخ'); }
            } else { btn.innerHTML = '❌ لا يوجد كود'; toast('❌ تعذر تحميل الكود'); }
            setTimeout(() => { btn.innerHTML = origHTML; btn.classList.remove('copied'); btn.disabled = false; }, 2200);
        };

        // ========== HELPERS ==========
        function esc(s) { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
        function fmt(n) { if(!n)return'0'; if(n>=1e6)return (n/1e6).toFixed(1)+'M'; if(n>=1e3)return (n/1e3).toFixed(1)+'K'; return n.toLocaleString('en'); }
        function toast(msg) {
            toastEl.textContent = msg;
            toastEl.style.display = 'block';
            toastEl.style.animation = 'none';
            toastEl.offsetHeight;
            toastEl.style.animation = 'toastUp 0.3s ease';
            setTimeout(() => { toastEl.style.display = 'none'; }, 2300);
        }

        // ========== EVENTS ==========
        document.getElementById('tabs').addEventListener('click', e => {
            const tab = e.target.closest('.tab');
            if (!tab) return;
            document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            S.src = tab.dataset.source;
            load(true);
        });

        document.getElementById('filtersRow').addEventListener('click', e => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            document.querySelectorAll('#filtersRow .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            S.filter = btn.dataset.filter;
            load(true);
        });

        document.getElementById('sortSelect').addEventListener('change', e => {
            S.sort = e.target.value;
            load(true);
        });

        search.addEventListener('input', e => {
            clearTimeout(S.timer);
            S.timer = setTimeout(async () => {
                const raw = e.target.value.trim();
                S.qRaw = raw;
                if (raw) {
                    S.qEn = await translateAnyToEnglish(raw);
                } else {
                    S.qEn = '';
                }
                load(true);
            }, 600);
        });

        btnM.addEventListener('click', loadMore);

        // INIT
        load(true);
    })();
    </script>
</body>
</html>
