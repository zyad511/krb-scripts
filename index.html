<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRB - مركز السكربتات | KSA Scripts Hub</title>
    <meta name="description" content="KRB - ابحث وانسخ أفضل سكربتات Roblox من Rscripts و ScriptBlox مع ترجمة فورية">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0f'/><text x='50' y='68' text-anchor='middle' font-size='50' font-weight='900' fill='%238b5cf6' font-family='Arial'>K</text></svg>">

    <style>
        :root {
            --bg: #0a0a0f;
            --card: #13131f;
            --card2: #1a1a2c;
            --border: #202035;
            --border2: #2e2e4a;
            --text: #eaeaef;
            --sub: #9090ae;
            --accent: #8b5cf6;
            --accent2: #a78bfa;
            --green: #34d399;
            --red: #f87171;
            --blue: #60a5fa;
            --gold: #fbbf24;
            --cyan: #22d3ee;
            --pink: #f472b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 10px;
        }

        /* ==================== HEADER ==================== */
        .header {
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-inner {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .logo-k { color: #fff; }
        .logo-r { color: var(--accent2); }
        .logo-b { color: var(--gold); }
        .logo-sub {
            font-size: 0.55rem;
            color: var(--sub);
            display: block;
            letter-spacing: 3px;
        }

        .search-wrap {
            flex: 1;
            min-width: 240px;
        }
        .search-wrap input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 25px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: #fff;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .search-wrap input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
        }
        .search-wrap input::placeholder {
            color: var(--sub);
        }

        /* ==================== TABS ==================== */
        .tabs {
            display: flex;
            gap: 0.3rem;
            background: var(--card);
            padding: 0.25rem;
            border-radius: 25px;
            border: 1px solid var(--border);
        }
        .tab {
            padding: 0.45rem 1.1rem;
            border-radius: 22px;
            border: none;
            background: transparent;
            color: var(--sub);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .tab.active {
            background: var(--accent);
            color: #fff;
        }
        .tab:hover:not(.active) {
            color: #fff;
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* ==================== HERO ==================== */
        .hero {
            text-align: center;
            padding: 1.5rem 1rem 1rem;
        }
        .hero h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 0.2rem;
        }
        .hero h1 span {
            color: var(--accent2);
        }
        .hero p {
            color: var(--sub);
            font-size: 0.88rem;
        }

        /* ==================== FILTERS ==================== */
        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
            align-items: center;
            padding: 0.6rem 1rem;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .filter-label {
            font-size: 0.75rem;
            color: var(--sub);
            font-weight: 700;
            margin-left: 0.3rem;
            white-space: nowrap;
        }
        .filter-btn {
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--sub);
            cursor: pointer;
            font-size: 0.74rem;
            font-weight: 600;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .filter-btn:hover:not(.active) {
            border-color: var(--border2);
            color: #fff;
        }
        .sort-select {
            margin-right: auto;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: #fff;
            font-size: 0.74rem;
            font-weight: 600;
            cursor: pointer;
        }
        .sort-select option {
            background: var(--card);
            color: #fff;
        }

        /* ==================== STATS ==================== */
        .stats {
            margin-bottom: 1.2rem;
            font-size: 0.82rem;
            color: var(--sub);
        }
        .stats .num {
            background: var(--accent);
            color: #fff;
            padding: 1px 8px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.76rem;
        }

        /* ==================== GRID ==================== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        /* ==================== CARD ==================== */
        .card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(139,92,246,0.1);
        }

        .card-img {
            position: relative;
            width: 100%;
            height: 165px;
            background: #080810;
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .card:hover .card-img img {
            transform: scale(1.05);
        }

        .card-badges {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.64rem;
            font-weight: 700;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .badge-key {
            background: rgba(248,113,113,0.9);
            color: #fff;
        }
        .badge-nokey {
            background: rgba(52,211,153,0.9);
            color: #000;
        }
        .badge-mobile {
            background: rgba(96,165,250,0.9);
            color: #fff;
        }
        .badge-patched {
            background: rgba(148,163,184,0.8);
            color: #fff;
        }
        .badge-source {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.85);
            color: #fff;
            font-size: 0.58rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .card-body {
            padding: 0.9rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .card-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }
        .card-desc {
            font-size: 0.74rem;
            color: var(--sub);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
            transition: all 0.3s;
        }
        .card-desc.translated {
            color: #d4c8f0;
            border-right: 2px solid var(--accent2);
            padding-right: 0.4rem;
            background: rgba(139,92,246,0.05);
            border-radius: 0 6px 6px 0;
            padding: 0.3rem 0.4rem;
        }

        .btn-translate {
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 15px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--accent2);
            cursor: pointer;
            font-weight: 600;
            align-self: flex-start;
            transition: all 0.25s;
        }
        .btn-translate:hover {
            background: rgba(139,92,246,0.1);
            border-color: var(--accent);
        }
        .btn-translate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-translate.done {
            background: rgba(52,211,153,0.1);
            border-color: var(--green);
            color: var(--green);
        }

        .card-game {
            font-size: 0.72rem;
        }
        .card-game a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 600;
        }
        .card-game a:hover {
            text-decoration: underline;
            color: #fff;
        }

        .card-dev {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding-top: 0.4rem;
            border-top: 1px solid var(--border);
        }
        .card-dev img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border2);
        }
        .card-dev .dev-name {
            font-size: 0.74rem;
            font-weight: 600;
            color: var(--text);
        }
        .dev-verified {
            color: var(--blue);
            margin-left: 2px;
        }

        .card-stats {
            display: flex;
            gap: 0.7rem;
            font-size: 0.72rem;
            color: var(--sub);
        }
        .card-stats span {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .stat-v {
            color: var(--cyan);
        }
        .stat-l {
            color: var(--pink);
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }
        .ctag {
            font-size: 0.58rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.02);
            color: var(--sub);
            border: 1px solid var(--border);
        }

        .btn-copy {
            width: 100%;
            padding: 0.6rem;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            margin-top: auto;
        }
        .btn-copy:hover {
            background: var(--accent2);
            box-shadow: 0 4px 15px rgba(139,92,246,0.3);
        }
        .btn-copy:active {
            transform: scale(0.97);
        }
        .btn-copy.copied {
            background: var(--green) !important;
        }
        .btn-copy:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== LOAD MORE ==================== */
        .load-more {
            text-align: center;
            margin: 2rem 0;
        }
        .btn-more {
            padding: 0.7rem 2.5rem;
            border-radius: 25px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-more:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 20px rgba(139,92,246,0.3);
        }
        .btn-more:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ==================== SKELETON ==================== */
        .skel {
            background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 14px;
            height: 380px;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* ==================== NO RESULTS ==================== */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--sub);
        }
        .no-results .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .no-results p {
            font-size: 1rem;
        }

        /* ==================== TOAST ==================== */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 0.6rem 1.5rem;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.82rem;
            z-index: 9999;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            animation: toastUp 0.3s ease;
        }
        @keyframes toastUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ==================== FOOTER ==================== */
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--sub);
            font-size: 0.72rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }
        footer a {
            color: var(--accent2);
            text-decoration: none;
        }
        footer a:hover {
            color: #fff;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: stretch;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .card-img {
                height: 150px;
            }
            .hero h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->

        <div class="header-inner">

    <!-- ==================== MAIN ==================== -->
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <h1>مركز <span>السكربتات</span> الأول</h1>
            <p>ابحث وانسخ أفضل سكربتات Roblox مع ترجمة فورية للوصف</p>
        </div>

        <!-- Filters -->
        <div class="filters-bar" id="filtersBar">
            <span class="filter-label">🎯 تصفية:</span>
            <button class="filter-btn active" data-f="all">✨ الكل</button>
            <button class="filter-btn" data-f="free">🆓 مجاني</button>
            <button class="filter-btn" data-f="nokey">🔓 بدون مفتاح</button>
            <button class="filter-btn" data-f="key">🔑 بمفتاح</button>
            <button class="filter-btn" data-f="mobile">📱 للجوال</button>
            <button class="filter-btn" data-f="unpatched">🟢 يعمل</button>
            <button class="filter-btn" data-f="verified">✅ موثق</button>
            <select class="sort-select" id="sortSelect">
                <option value="default">🔥 الأكثر تداولاً</option>
                <option value="newest">📅 الأحدث</option>
                <option value="views">👁️ الأكثر مشاهدة</option>
                <option value="likes">❤️ الأكثر إعجاباً</option>
            </select>

        <div class="stats" id="stats">⏳ جاري تحميل السكربتات...</div>

        <!-- Grid -->

            <div class="skel"></div><div class="skel"></div><div class="skel"></div>

    <!-- ==================== FOOTER ==================== -->
    <footer>
        <p><strong style="color:#fff;">KRB</strong> — مركز السكربتات | Powered by 
           <a href="https://scriptblox.com" target="_blank" rel="noopener">ScriptBlox</a> &amp; 
           <a href="https://rscripts.net" target="_blank" rel="noopener">Rscripts</a>
        </p>
        <p style="margin-top:0.3rem;">© 2025 KRB Scripts Hub - جميع الحقوق محفوظة</p>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast" style="display:none;"></div>

    <!-- ==================== SCRIPTS ENGINE ==================== -->
    <script>
    (function() {
        // ==================== STATE ====================
        const S = {
            src: 'all',
            f: 'all',
            sort: 'default',
            qRaw: '',
            qEn: '',
            pR: 1,
            pB: 1,
            mR: true,
            mB: true,
            busy: false,
            scripts: [],
            timer: null
        };

        // ==================== DOM ====================
        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const statsEl = document.getElementById('stats');
        const btnMore = document.getElementById('btnMore');
        const toastEl = document.getElementById('toast');

        // ==================== TRANSLATE CACHE ====================
        const trCache = {};

        // ==================== TRANSLATE ANY LANGUAGE TO ENGLISH ====================
        async function translateToEnglish(text) {
            if (!text || text.length === 0) return '';
            // If already plain English, return as is
            if (/^[a-zA-Z0-9\s.,!?\-+=\[\]{}'"<>:;@#$%^&*()_/\\]+$/.test(text) && !/[^\x00-\x7F]/.test(text)) {
                return text;
            }
            const cacheKey = 'toen_' + text.substring(0, 80);
            if (trCache[cacheKey]) return trCache[cacheKey];
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Translate failed');
                const data = await res.json();
                let translated = data?.[0]?.map(part => part[0]).join('') || text;
                if (translated && translated !== text) {
                    trCache[cacheKey] = translated;
                }
                return translated;
            } catch (e) {
                console.error('Translation error:', e);
                return text;
            }
        }

        // ==================== TRANSLATE TEXT TO ARABIC ====================
        async function translateToArabic(text) {
            if (!text || text.length < 3) return text;
            const cacheKey = 'toar_' + text.substring(0, 70);
            if (trCache[cacheKey]) return trCache[cacheKey];
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ar&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Translate failed');
                const data = await res.json();
                let translated = data?.[0]?.map(part => part[0]).join('') || text;
                if (translated && translated !== text) {
                    trCache[cacheKey] = translated;
                }
                return translated;
            } catch (e) {
                console.error('Translation error:', e);
                return text;
            }
        }

        // ==================== URL BUILDERS ====================
        function buildRscriptsURL(isTrending) {
            if (isTrending && !S.qEn) {
                return 'https://rscripts.net/api/v2/trending';
            }
            const params = new URLSearchParams();
            params.set('page', S.pR.toString());
            params.set('sort', 'desc');
            if (S.sort === 'newest') params.set('orderBy', 'date');
            else if (S.sort === 'views') params.set('orderBy', 'views');
            else if (S.sort === 'likes') params.set('orderBy', 'likes');
            else params.set('orderBy', 'date');
            if (S.qEn) params.set('q', S.qEn);
            if (S.f === 'nokey') params.set('noKeySystem', 'true');
            if (S.f === 'mobile') params.set('mobileOnly', 'true');
            if (S.f === 'free') params.set('notPaid', 'true');
            if (S.f === 'unpatched') params.set('unpatched', 'true');
            if (S.f === 'verified') params.set('verifiedOnly', 'true');
            return 'https://rscripts.net/api/v2/scripts?' + params.toString();
        }

        function buildBloxscriptURL(isTrending) {
            if (isTrending && !S.qEn) {
                return 'https://scriptblox.com/api/script/trending';
            }
            const endpoint = S.qEn ? '/script/search' : '/script/fetch';
            const params = new URLSearchParams();
            params.set('page', S.pB.toString());
            params.set('max', '40');
            if (S.qEn) params.set('q', S.qEn);
            if (S.sort === 'newest') {
                params.set('sortBy', 'createdAt');
                params.set('order', 'desc');
            } else if (S.sort === 'views') {
                params.set('sortBy', 'views');
                params.set('order', 'desc');
            } else if (S.sort === 'likes') {
                params.set('sortBy', 'likeCount');
                params.set('order', 'desc');
            }
            if (S.f === 'free') params.set('mode', 'free');
            if (S.f === 'nokey') params.set('key', '0');
            if (S.f === 'key') params.set('key', '1');
            if (S.f === 'verified') params.set('verified', '1');
            if (S.f === 'unpatched') params.set('patched', '0');
            return 'https://scriptblox.com/api' + endpoint + '?' + params.toString();
        }

        // ==================== NORMALIZE RSCRIPTS ====================
        function normalizeRscript(raw) {
            // Handle trending response structure
            let s = raw;
            if (raw.script) {
                s = { ...raw.script, views: raw.views || raw.script.views, user: raw.user };
            }

            const hasUser = s.user && typeof s.user === 'object' && Object.keys(s.user).length > 0;
            const title = s.title || (s.script && s.script.title) || 'بدون عنوان';
            const description = (s.description || (s.script && s.script.description) || '').trim();
            const image = s.image || (s.script && s.script.image) || (s.game && s.game.imgurl) || '';
            const dev = hasUser ? (s.user.username || '') : (s.creator || 'مجهول');
            const devImg = hasUser ? (s.user.image || '') : '';
            const devVerified = hasUser ? (s.user.verified || false) : false;
            const views = s.views || (s.script && s.script.views) || 0;
            const likes = s.likes || (s.script && s.script.likes) || 0;
            const dislikes = s.dislikes || 0;
            const hasKey = s.keySystem || false;
            const isPaid = s.paid || false;
            const isMobile = s.mobileReady || false;
            const gameName = (s.game && s.game.title) || '';
            const gameId = (s.game && s.game.placeId) || null;
            const gameLink = (s.game && s.game.gameLink) || (gameId ? 'https://www.roblox.com/games/' + gameId : '');
            const codeUrl = s.rawScript || null;

            return {
                id: s._id || s.id || '',
                title: title,
                desc: description,
                img: image,
                dev: dev,
                devImg: devImg,
                devV: devVerified,
                views: views,
                likes: likes,
                dislikes: dislikes,
                key: hasKey,
                paid: isPaid,
                mobile: isMobile,
                patched: false,
                game: gameName,
                gameUrl: gameLink,
                codeUrl: codeUrl,
                code: null,
                tags: [],
                source: 'rscripts'
            };
        }

        // ==================== NORMALIZE BLOXSCRIPT ====================
        function normalizeBloxscript(s) {
            const owner = s.owner || {};
            return {
                id: s._id || '',
                title: s.title || 'بدون عنوان',
                desc: (s.features || '').trim(),
                img: s.image || (s.game && s.game.imageUrl) || '',
                dev: owner.username || 'مجهول',
                devImg: owner.profilePicture || '',
                devV: owner.verified || s.verified || false,
                views: s.views || 0,
                likes: s.likeCount || 0,
                dislikes: s.dislikeCount || 0,
                key: s.key || false,
                paid: s.scriptType === 'paid',
                mobile: false,
                patched: s.isPatched || false,
                game: (s.game && s.game.name) || '',
                gameUrl: (s.game && s.game.gameId) ? 'https://www.roblox.com/games/' + s.game.gameId : '',
                code: s.script || null,
                tags: Array.isArray(s.tags) ? s.tags : [],
                source: 'bloxscript'
            };
        }

        // ==================== FETCH RSCRIPTS ====================
        async function fetchRscripts(isTrending) {
            try {
                const url = buildRscriptsURL(isTrending);
                const res = await fetch(url);
                if (!res.ok) throw new Error('Rscripts status: ' + res.status);
                const data = await res.json();

                let scripts = [];
                if (isTrending && !S.qEn) {
                    // Trending endpoint
                    if (data.success && Array.isArray(data.success)) {
                        scripts = data.success;
                    } else if (Array.isArray(data)) {
                        scripts = data;
                    }
                } else {
                    // Scripts list endpoint
                    if (data.scripts && Array.isArray(data.scripts)) {
                        scripts = data.scripts;
                    }
                }

                // Update pagination
                const currentPage = data.info?.currentPage || S.pR;
                const maxPages = data.info?.maxPages || 1;
                S.mR = currentPage < maxPages;

                return scripts.map(s => normalizeRscript(s));
            } catch (e) {
                console.error('Rscripts fetch error:', e.message);
                return [];
            }
        }

        // ==================== FETCH BLOXSCRIPT ====================
        async function fetchBloxscript(isTrending) {
            try {
                const url = buildBloxscriptURL(isTrending);
                const res = await fetch(url);
                if (!res.ok) throw new Error('Bloxscript status: ' + res.status);
                const data = await res.json();

                const scripts = data.result?.scripts || [];
                const totalPages = data.result?.totalPages || 1;
                S.mB = S.pB < totalPages;

                return scripts.map(s => normalizeBloxscript(s));
            } catch (e) {
                console.error('Bloxscript fetch error:', e.message);
                return [];
            }
        }

        // ==================== GET SCRIPT CODE ====================
        const codeCache = {};
        async function getCode(script) {
            const cacheKey = script.source + '_' + script.id;
            if (codeCache[cacheKey]) return codeCache[cacheKey];

            // If code is already in the script object
            if (script.code) {
                codeCache[cacheKey] = script.code;
                return script.code;
            }

            // Rscripts: fetch from rawScript URL
            if (script.source === 'rscripts' && script.codeUrl) {
                try {
                    const res = await fetch(script.codeUrl);
                    if (res.ok) {
                        const text = await res.text();
                        codeCache[cacheKey] = text;
                        return text;
                    }
                } catch (e) {
                    // Try CORS proxy
                    try {
                        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(script.codeUrl);
                        const res = await fetch(proxyUrl);
                        if (res.ok) {
                            const text = await res.text();
                            codeCache[cacheKey] = text;
                            return text;
                        }
                    } catch (e2) {
                        console.error('CORS proxy failed:', e2);
                    }
                }
            }

            // Bloxscript: fetch from raw endpoint
            if (script.source === 'bloxscript') {
                try {
                    const res = await fetch('https://scriptblox.com/api/script/raw/' + script.id);
                    if (res.ok) {
                        const text = await res.text();
                        codeCache[cacheKey] = text;
                        return text;
                    }
                } catch (e) {
                    console.error('Bloxscript raw fetch failed:', e);
                }
            }

            return null;
        }

        // ==================== LOCAL FILTER ====================
        function applyLocalFilter(arr) {
            if (S.f === 'all') return arr;
            return arr.filter(function(s) {
                switch (S.f) {
                    case 'free':
                        return !s.paid && !s.key;
                    case 'nokey':
                        return !s.key;
                    case 'key':
                        return s.key;
                    case 'mobile':
                        return s.mobile;
                    case 'unpatched':
                        return !s.patched;
                    case 'verified':
                        return s.devV;
                    default:
                        return true;
                }
            });
        }

        // ==================== MAIN LOAD ====================
        async function loadScripts(reset) {
            if (S.busy) return;
            S.busy = true;

            if (reset === undefined) reset = true;

            if (reset) {
                S.pR = 1;
                S.pB = 1;
                S.mR = true;
                S.mB = true;
                S.scripts = [];
                grid.innerHTML = '';
                for (var i = 0; i < 8; i++) {
                    grid.innerHTML += '<div class="skel"></div>';
                }
                btnMore.style.display = 'none';
            }

            btnMore.disabled = true;
            var isTrending = S.sort === 'default' && !S.qEn;
            var allScripts = [];

            // Fetch from selected sources
            if (S.src === 'all' || S.src === 'rscripts') {
                var rscripts = await fetchRscripts(isTrending);
                allScripts = allScripts.concat(rscripts);
            }
            if (S.src === 'all' || S.src === 'bloxscript') {
                var bloxscripts = await fetchBloxscript(isTrending);
                allScripts = allScripts.concat(bloxscripts);
            }

            // Apply local filter
            allScripts = applyLocalFilter(allScripts);

            // Sort locally if needed
            if (S.sort === 'views') {
                allScripts.sort(function(a, b) { return b.views - a.views; });
            } else if (S.sort === 'likes') {
                allScripts.sort(function(a, b) { return b.likes - a.likes; });
            }

            // Merge with existing scripts
            if (reset) {
                S.scripts = allScripts;
            } else {
                S.scripts = S.scripts.concat(allScripts);
            }

            // Remove duplicates
            S.scripts = S.scripts.filter(function(s, i, a) {
                return a.findIndex(function(x) {
                    return x.id === s.id && x.source === s.source;
                }) === i;
            });

            // Render
            renderScripts();

            // Update load more button
            var hasMore;
            if (S.src === 'all') {
                hasMore = S.mR || S.mB;
            } else if (S.src === 'rscripts') {
                hasMore = S.mR;
            } else {
                hasMore = S.mB;
            }

            if (hasMore) {
                btnMore.style.display = 'inline-block';
            } else {
                btnMore.style.display = 'none';
            }
            btnMore.disabled = false;

            statsEl.innerHTML = '✅ تم العثور على <span class="num">' + S.scripts.length + '</span> سكربت';
            S.busy = false;
        }

        // ==================== LOAD MORE ====================
        function loadMore() {
            if (S.src === 'all') {
                if (S.mR) S.pR++;
                if (S.mB) S.pB++;
            } else if (S.src === 'rscripts') {
                S.pR++;
            } else {
                S.pB++;
            }
            loadScripts(false);
        }

        // ==================== RENDER ====================
        function renderScripts() {
            if (!S.scripts.length) {
                grid.innerHTML = '<div class="no-results"><div class="icon">🔍</div><p>لا توجد نتائج</p><p style="font-size:0.8rem;margin-top:0.3rem;">جرب تغيير الفلاتر أو البحث بكلمة مختلفة</p></div>';
                return;
            }

            grid.innerHTML = '';
            for (var i = 0; i < S.scripts.length; i++) {
                var s = S.scripts[i];
                var desc = (s.desc || '').substring(0, 180);
                var hasDesc = desc.length > 8;
                var isEnglish = /^[a-zA-Z]/.test(desc);
                var uid = (s.source + '_' + s.id).replace(/[^a-zA-Z0-9]/g, '_');

                // Badges
                var badgesHtml = '';
                if (s.key) {
                    badgesHtml += '<span class="badge badge-key">🔑 بمفتاح</span>';
                } else {
                    badgesHtml += '<span class="badge badge-nokey">🔓 بدون مفتاح</span>';
                }
                if (s.mobile) {
                    badgesHtml += '<span class="badge badge-mobile">📱 جوال</span>';
                }
                if (s.patched) {
                    badgesHtml += '<span class="badge badge-patched">🚫 متوقف</span>';
                }

                // Translate button
                var translateBtn = '';
                if (hasDesc && isEnglish) {
                    translateBtn = '<button class="btn-translate" onclick="window._krbTranslate(this,\'' + uid + '\')">🌐 ترجمة الوصف</button>';
                }

                // Game
                var gameHtml = '';
                if (s.game) {
                    gameHtml = '<div class="card-game">🎮 <a href="' + escHtml(s.gameUrl) + '" target="_blank" rel="noopener">' + escHtml(s.game) + '</a></div>';
                }

                // Tags
                var tagsHtml = '';
                if (s.tags && s.tags.length > 0) {
                    tagsHtml = '<div class="card-tags">';
                    for (var t = 0; t < Math.min(s.tags.length, 4); t++) {
                        tagsHtml += '<span class="ctag">#' + escHtml(s.tags[t]) + '</span>';
                    }
                    tagsHtml += '</div>';
                }

                // Developer
                var devVerifiedHtml = s.devV ? '<span class="dev-verified">✅</span>' : '';
                var devImgHtml = s.devImg ? '<img src="' + escHtml(s.devImg) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '';

                // Source label
                var sourceLabel = s.source === 'rscripts' ? '📜 Rscripts' : '📦 ScriptBlox';

                // Stats
                var viewsFormatted = fmtNum(s.views);
                var likesFormatted = fmtNum(s.likes);

                // Image
                var imgHtml = s.img ? '<img src="' + escHtml(s.img) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '';

                // Description HTML
                var descHtml = '';
                if (hasDesc) {
                    descHtml = '<div class="card-desc" id="desc-' + uid + '" data-o="' + escHtml(desc) + '">' + escHtml(desc) + '</div>';
                }

                grid.innerHTML += '<div class="card">' +
                    '<div class="card-img">' +
                        imgHtml +
                        '<div class="card-badges">' + badgesHtml + '</div>' +
                        '<span class="badge badge-source">' + sourceLabel + '</span>' +
                    '</div>' +
                    '<div class="card-body">' +
                        '<div class="card-title">' + escHtml(s.title) + '</div>' +
                        descHtml +
                        translateBtn +
                        gameHtml +
                        tagsHtml +
                        '<div class="card-dev">' +
                            devImgHtml +
                            '<span class="dev-name">' + devVerifiedHtml + escHtml(s.dev) + '</span>' +
                        '</div>' +
                        '<div class="card-stats">' +
                            '<span class="stat-v">👁️ ' + viewsFormatted + '</span>' +
                            '<span class="stat-l">❤️ ' + likesFormatted + '</span>' +
                        '</div>' +
                        '<button class="btn-copy" onclick="window._krbCopy(this,\'' + escHtml(s.id) + '\',\'' + s.source + '\')">📋 نسخ السكربت</button>' +
                    '</div>' +
                '</div>';
            }
        }

        // ==================== TRANSLATE DESCRIPTION ====================
        window._krbTranslate = async function(btn, uid) {
            if (btn.disabled) return;
            var el = document.getElementById('desc-' + uid);
            if (!el) return;
            var original = el.getAttribute('data-o') || el.textContent;
            btn.innerHTML = '⏳...';
            btn.disabled = true;
            var translated = await translateToArabic(original);
            if (translated && translated !== original) {
                el.textContent = translated;
                el.classList.add('translated');
                btn.innerHTML = '✅ تمت';
                btn.classList.add('done');
                showToast('✅ تمت ترجمة الوصف');
            } else {
                btn.innerHTML = '⚠️ فشل';
                showToast('⚠️ تعذرت الترجمة');
            }
            setTimeout(function() {
                if (btn.classList.contains('done')) {
                    btn.innerHTML = '🔄 إعادة';
                } else {
                    btn.innerHTML = '🌐 ترجمة الوصف';
                }
                btn.disabled = false;
            }, 2000);
        };

        // ==================== COPY SCRIPT ====================
        window._krbCopy = async function(btn, id, source) {
            if (btn.disabled) return;
            var origHTML = btn.innerHTML;
            btn.innerHTML = '⏳ جاري التحميل...';
            btn.disabled = true;

            var script = null;
            for (var i = 0; i < S.scripts.length; i++) {
                if (S.scripts[i].id === id && S.scripts[i].source === source) {
                    script = S.scripts[i];
                    break;
                }
            }

            if (!script) {
                btn.innerHTML = origHTML;
                btn.disabled = false;
                return;
            }

            var code = await getCode(script);
            if (code) {
                try {
                    await navigator.clipboard.writeText(code);
                    btn.innerHTML = '✅ تم النسخ!';
                    btn.classList.add('copied');
                    showToast('✅ تم نسخ كود السكربت بنجاح!');
                } catch (e) {
                    btn.innerHTML = '❌ فشل النسخ';
                    showToast('❌ تعذر الوصول للحافظة');
                }
            } else {
                btn.innerHTML = '❌ لم يتم العثور على الكود';
                showToast('❌ تعذر تحميل كود السكربت');
            }

            setTimeout(function() {
                btn.innerHTML = origHTML;
                btn.classList.remove('copied');
                btn.disabled = false;
            }, 2200);
        };

        // ==================== HELPERS ====================
        function escHtml(str) {
            if (!str) return '';
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function fmtNum(n) {
            if (!n || n === 0) return '0';
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toLocaleString('en');
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.style.display = 'block';
            toastEl.style.animation = 'none';
            toastEl.offsetHeight;
            toastEl.style.animation = 'toastUp 0.3s ease';
            setTimeout(function() {
                toastEl.style.display = 'none';
            }, 2300);
        }

        // ==================== EVENT LISTENERS ====================
        // Tabs
        document.getElementById('tabs').addEventListener('click', function(e) {
            var tab = e.target.closest('.tab');
            if (!tab) return;
            var allTabs = document.querySelectorAll('#tabs .tab');
            for (var i = 0; i < allTabs.length; i++) {
                allTabs[i].classList.remove('active');
            }
            tab.classList.add('active');
            S.src = tab.getAttribute('data-src');
            loadScripts(true);
        });

        // Filters
        document.getElementById('filtersBar').addEventListener('click', function(e) {
            var btn = e.target.closest('.filter-btn');
            if (!btn) return;
            var allBtns = document.querySelectorAll('#filtersBar .filter-btn');
            for (var i = 0; i < allBtns.length; i++) {
                allBtns[i].classList.remove('active');
            }
            btn.classList.add('active');
            S.f = btn.getAttribute('data-f');
            loadScripts(true);
        });

        // Sort
        document.getElementById('sortSelect').addEventListener('change', function(e) {
            S.sort = e.target.value;
            loadScripts(true);
        });

        // Search
        searchInput.addEventListener('input', function(e) {
            clearTimeout(S.timer);
            S.timer = setTimeout(async function() {
                var raw = e.target.value.trim();
                S.qRaw = raw;
                if (raw) {
                    S.qEn = await translateToEnglish(raw);
                } else {
                    S.qEn = '';
                }
                loadScripts(true);
            }, 600);
        });

        // Load more
        btnMore.addEventListener('click', function() {
            loadMore();
        });

        // ==================== INIT ====================
        loadScripts(true);
    })();
    </script>
</body>
