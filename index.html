<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRB - مركز السكربتات</title>
    <meta name="theme-color" content="#0a0a0f">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #13131f;
            --border: #202035;
            --border2: #2e2e4a;
            --text: #eaeaef;
            --sub: #9090ae;
            --accent: #8b5cf6;
            --accent2: #a78bfa;
            --green: #34d399;
            --red: #f87171;
            --blue: #60a5fa;
            --gold: #fbbf24;
            --cyan: #22d3ee;
            --pink: #f472b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

        .header {
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-inner {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; white-space: nowrap; }
        .logo-k { color: #fff; }
        .logo-r { color: var(--accent2); }
        .logo-b { color: var(--gold); }
        .logo-sub { font-size: 0.55rem; color: var(--sub); display: block; letter-spacing: 3px; }

        .search-wrap { flex: 1; min-width: 240px; }
        .search-wrap input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 25px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: #fff;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .search-wrap input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
        }
        .search-wrap input::placeholder { color: var(--sub); }

        .tabs {
            display: flex;
            gap: 0.3rem;
            background: var(--card);
            padding: 0.25rem;
            border-radius: 25px;
            border: 1px solid var(--border);
        }
        .tab {
            padding: 0.45rem 1.1rem;
            border-radius: 22px;
            border: none;
            background: transparent;
            color: var(--sub);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .tab.active { background: var(--accent); color: #fff; }
        .tab:hover:not(.active) { color: #fff; }

        .container { max-width: 1500px; margin: 0 auto; padding: 1.5rem; }

        .hero { text-align: center; padding: 1.5rem 1rem 1rem; }
        .hero h1 { font-size: 1.8rem; font-weight: 900; color: #fff; margin-bottom: 0.2rem; }
        .hero h1 span { color: var(--accent2); }
        .hero p { color: var(--sub); font-size: 0.88rem; }

        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
            align-items: center;
            padding: 0.6rem 1rem;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .filter-label { font-size: 0.75rem; color: var(--sub); font-weight: 700; margin-left: 0.3rem; white-space: nowrap; }
        .filter-btn {
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--sub);
            cursor: pointer;
            font-size: 0.74rem;
            font-weight: 600;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .filter-btn:hover:not(.active) { border-color: var(--border2); color: #fff; }
        .sort-select {
            margin-right: auto;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: #fff;
            font-size: 0.74rem;
            font-weight: 600;
            cursor: pointer;
        }
        .sort-select option { background: var(--card); color: #fff; }

        .stats { margin-bottom: 1.2rem; font-size: 0.82rem; color: var(--sub); }
        .stats .num { background: var(--accent); color: #fff; padding: 1px 8px; border-radius: 10px; font-weight: 700; font-size: 0.76rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }

        .card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 12px 35px rgba(139,92,246,0.1); }

        .card-img { position: relative; width: 100%; height: 165px; background: #080810; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .card:hover .card-img img { transform: scale(1.05); }

        .card-badges { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
        .badge { padding: 3px 8px; border-radius: 6px; font-size: 0.64rem; font-weight: 700; backdrop-filter: blur(6px); }
        .badge-key { background: rgba(248,113,113,0.9); color: #fff; }
        .badge-nokey { background: rgba(52,211,153,0.9); color: #000; }
        .badge-mobile { background: rgba(96,165,250,0.9); color: #fff; }
        .badge-source { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.85); color: #fff; font-size: 0.58rem; padding: 2px 6px; border-radius: 4px; }

        .card-body { padding: 0.9rem; flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
        .card-title { font-size: 0.9rem; font-weight: 700; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .card-desc { font-size: 0.74rem; color: var(--sub); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex: 1; transition: all 0.3s; }
        .card-desc.translated { color: #d4c8f0; border-right: 2px solid var(--accent2); padding-right: 0.4rem; }

        .btn-translate { font-size: 0.65rem; padding: 3px 10px; border-radius: 15px; border: 1px solid var(--border2); background: transparent; color: var(--accent2); cursor: pointer; font-weight: 600; align-self: flex-start; transition: all 0.25s; }
        .btn-translate:hover { background: rgba(139,92,246,0.1); border-color: var(--accent); }
        .btn-translate:disabled { opacity: 0.5; }
        .btn-translate.done { background: rgba(52,211,153,0.1); border-color: var(--green); color: var(--green); }

        .card-game { font-size: 0.72rem; }
        .card-game a { color: var(--cyan); text-decoration: none; font-weight: 600; }
        .card-game a:hover { text-decoration: underline; color: #fff; }

        .card-dev { display: flex; align-items: center; gap: 0.4rem; padding-top: 0.4rem; border-top: 1px solid var(--border); }
        .card-dev img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border2); }
        .card-dev .dev-name { font-size: 0.74rem; font-weight: 600; color: var(--text); }
        .dev-verified { color: var(--blue); margin-left: 2px; }

        .card-stats { display: flex; gap: 0.7rem; font-size: 0.72rem; color: var(--sub); }
        .stat-v { color: var(--cyan); }
        .stat-l { color: var(--pink); }

        .card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
        .ctag { font-size: 0.58rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.02); color: var(--sub); border: 1px solid var(--border); }

        .btn-copy { width: 100%; padding: 0.6rem; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; font-size: 0.82rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.3rem; margin-top: auto; }
        .btn-copy:hover { background: var(--accent2); }
        .btn-copy.copied { background: var(--green) !important; }
        .btn-copy:disabled { opacity: 0.5; }

        .load-more { text-align: center; margin: 2rem 0; }
        .btn-more { padding: 0.7rem 2.5rem; border-radius: 25px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; }
        .btn-more:hover { background: var(--accent); color: #fff; }
        .btn-more:disabled { opacity: 0.3; }

        .skel { background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 14px; height: 380px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .no-results { grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--sub); }
        .no-results .icon { font-size: 3rem; margin-bottom: 1rem; }

        .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 0.6rem 1.5rem; border-radius: 25px; font-weight: 700; font-size: 0.82rem; z-index: 9999; box-shadow: 0 8px 25px rgba(0,0,0,0.5); animation: toastUp 0.3s ease; }
        @keyframes toastUp { from { opacity: 0; transform: translateX(-50%) translateY(15px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        footer { text-align: center; padding: 1.5rem; color: var(--sub); font-size: 0.72rem; border-top: 1px solid var(--border); margin-top: 2rem; }
        footer a { color: var(--accent2); text-decoration: none; }

        @media (max-width: 768px) { .header-inner { flex-direction: column; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-k">K</span><span class="logo-r">R</span><span class="logo-b">B</span>
                <span class="logo-sub">SCRIPTS HUB</span>
            </div>
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="🔍 ابحث عن سكربت بأي لغة..." autocomplete="off">
            </div>
            <div class="tabs" id="tabs">
                <button class="tab active" data-src="all">🌐 الكل</button>
                <button class="tab" data-src="rscripts">📜 Rscripts</button>
                <button class="tab" data-src="bloxscript">📦 ScriptBlox</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1>مركز <span>السكربتات</span> الأول</h1>
            <p>ابحث وانسخ أفضل سكربتات Roblox مع ترجمة فورية للوصف</p>
        </div>

        <div class="filters-bar" id="filtersBar">
            <span class="filter-label">🎯 تصفية:</span>
            <button class="filter-btn active" data-f="all">✨ الكل</button>
            <button class="filter-btn" data-f="free">🆓 مجاني</button>
            <button class="filter-btn" data-f="nokey">🔓 بدون مفتاح</button>
            <button class="filter-btn" data-f="key">🔑 بمفتاح</button>
            <button class="filter-btn" data-f="mobile">📱 للجوال</button>
            <button class="filter-btn" data-f="unpatched">🟢 يعمل</button>
            <button class="filter-btn" data-f="verified">✅ موثق</button>
            <select class="sort-select" id="sortSelect">
                <option value="default">🔥 الأكثر تداولاً</option>
                <option value="newest">📅 الأحدث</option>
                <option value="views">👁️ الأكثر مشاهدة</option>
                <option value="likes">❤️ الأكثر إعجاباً</option>
            </select>
        </div>

        <div class="stats" id="stats">⏳ جاري التحميل...</div>
        <div class="grid" id="grid"></div>
        <div class="load-more"><button class="btn-more" id="btnMore" style="display:none;">📥 تحميل المزيد</button></div>
    </div>

    <footer>© 2025 KRB Scripts | Powered by Rscripts & ScriptBlox</footer>
    <div class="toast" id="toast" style="display:none;"></div>

    <script>
    (function() {
        var S = {
            src: 'all', f: 'all', sort: 'default', qRaw: '', qEn: '',
            pR: 1, pB: 1, mR: true, mB: true, busy: false,
            scripts: [], timer: null
        };
        var grid = document.getElementById('grid');
        var searchInput = document.getElementById('searchInput');
        var statsEl = document.getElementById('stats');
        var btnMore = document.getElementById('btnMore');
        var toastEl = document.getElementById('toast');
        var trCache = {};

        // ========== TRANSLATE TO ENGLISH ==========
        async function toEn(text) {
            if (!text) return '';
            if (/^[a-zA-Z0-9\s.,!?\-+=\[\]{}'"<>:;@#$%^&*()_/\\]+$/.test(text) && !/[^\x00-\x7F]/.test(text)) return text;
            var k = 'en_' + text.substring(0, 80);
            if (trCache[k]) return trCache[k];
            try {
                var u = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=' + encodeURIComponent(text);
                var r = await fetch(u);
                var d = await r.json();
                var tx = '';
                if (d && d[0]) { for (var i = 0; i < d[0].length; i++) { tx += d[0][i][0]; } }
                if (!tx) tx = text;
                if (tx !== text) trCache[k] = tx;
                return tx;
            } catch (e) { return text; }
        }

        // ========== TRANSLATE TO ARABIC ==========
        async function toAr(text) {
            if (!text || text.length < 3) return text;
            var k = 'ar_' + text.substring(0, 70);
            if (trCache[k]) return trCache[k];
            try {
                var u = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ar&dt=t&q=' + encodeURIComponent(text);
                var r = await fetch(u);
                var d = await r.json();
                var tx = '';
                if (d && d[0]) { for (var i = 0; i < d[0].length; i++) { tx += d[0][i][0]; } }
                if (!tx) tx = text;
                if (tx !== text) trCache[k] = tx;
                return tx;
            } catch (e) { return text; }
        }

        // ========== BUILD RSCRIPTS URL ==========
        function urlR() {
            // TRENDING: no search + default sort
            if (!S.qEn && S.sort === 'default') {
                return 'https://rscripts.net/api/v2/trending';
            }
            // SCRIPTS LIST with filters
            var p = new URLSearchParams();
            p.set('page', S.pR.toString());
            p.set('sort', 'desc');
            if (S.sort === 'newest') p.set('orderBy', 'date');
            else if (S.sort === 'views') p.set('orderBy', 'views');
            else if (S.sort === 'likes') p.set('orderBy', 'likes');
            else p.set('orderBy', 'date');
            if (S.qEn) p.set('q', S.qEn);
            if (S.f === 'nokey') p.set('noKeySystem', 'true');
            if (S.f === 'mobile') p.set('mobileOnly', 'true');
            if (S.f === 'free') p.set('notPaid', 'true');
            if (S.f === 'unpatched') p.set('unpatched', 'true');
            if (S.f === 'verified') p.set('verifiedOnly', 'true');
            return 'https://rscripts.net/api/v2/scripts?' + p.toString();
        }

        // ========== BUILD BLOXSCRIPT URL ==========
        function urlB() {
            // TRENDING
            if (!S.qEn && S.sort === 'default') {
                return 'https://scriptblox.com/api/script/trending';
            }
            // SEARCH or FETCH
            var endpoint = S.qEn ? '/script/search' : '/script/fetch';
            var p = new URLSearchParams();
            p.set('page', S.pB.toString());
            p.set('max', '40');
            if (S.qEn) p.set('q', S.qEn);
            if (S.sort === 'newest') { p.set('sortBy', 'createdAt'); p.set('order', 'desc'); }
            else if (S.sort === 'views') { p.set('sortBy', 'views'); p.set('order', 'desc'); }
            else if (S.sort === 'likes') { p.set('sortBy', 'likeCount'); p.set('order', 'desc'); }
            if (S.f === 'free') p.set('mode', 'free');
            if (S.f === 'nokey') p.set('key', '0');
            if (S.f === 'key') p.set('key', '1');
            if (S.f === 'verified') p.set('verified', '1');
            if (S.f === 'unpatched') p.set('patched', '0');
            return 'https://scriptblox.com/api' + endpoint + '?' + p.toString();
        }

        // ========== NORMALIZE RSCRIPT ==========
        function nR(raw) {
            // Trending structure: { _id, views, script: {...}, user: {...} }
            // Scripts list structure: { _id, title, description, user: {...}, ... }
            var s;
            if (raw.script && typeof raw.script === 'object') {
                // Trending format
                s = raw.script;
                s._id = s._id || raw._id;
                s.views = raw.views || s.views || 0;
                s.user = raw.user || s.user;
                s.likes = s.likes || 0;
            } else {
                s = raw;
            }
            var hasUser = s.user && typeof s.user === 'object' && Object.keys(s.user).length > 0;
            return {
                id: s._id || s.id || '',
                title: s.title || 'بدون عنوان',
                desc: (s.description || '').trim(),
                img: s.image || (s.game && s.game.imgurl) || '',
                dev: hasUser ? (s.user.username || '') : (s.creator || 'مجهول'),
                devImg: hasUser ? (s.user.image || '') : '',
                devV: hasUser ? (s.user.verified || false) : false,
                views: s.views || 0,
                likes: s.likes || 0,
                dislikes: s.dislikes || 0,
                key: s.keySystem || false,
                paid: s.paid || false,
                mobile: s.mobileReady || false,
                patched: false,
                game: (s.game && s.game.title) || '',
                gameUrl: (s.game && s.game.gameLink) || (s.game && s.game.placeId ? 'https://roblox.com/games/' + s.game.placeId : ''),
                codeUrl: s.rawScript || null,
                code: null,
                tags: [],
                source: 'rscripts'
            };
        }

        // ========== NORMALIZE BLOXSCRIPT ==========
        function nB(s) {
            // Trending: { _id, views, script: {...}, user: {...} }
            // Fetch/Search: { _id, title, owner: {...}, ... }
            var owner = {};
            var title = s.title || '';
            var features = s.features || '';
            var image = s.image || '';
            var gameName = '';
            var gameId = null;
            var scriptCode = s.script || null;
            var tags = s.tags || [];

            // If trending structure (nested script object)
            if (s.script && typeof s.script === 'object') {
                title = s.script.title || title;
                features = s.script.features || features;
                image = s.script.image || image;
                gameName = s.script.game && s.script.game.name ? s.script.game.name : '';
                gameId = s.script.game && s.script.game.gameId ? s.script.game.gameId : null;
                scriptCode = s.script.script || scriptCode;
                tags = s.script.tags || tags;
                owner = s.user || s.script.owner || {};
            } else {
                // Normal structure
                owner = s.owner || {};
                gameName = s.game && s.game.name ? s.game.name : '';
                gameId = s.game && s.game.gameId ? s.game.gameId : null;
                image = s.image || (s.game && s.game.imageUrl) || '';
            }

            return {
                id: s._id || '',
                title: title || 'بدون عنوان',
                desc: (features || '').trim(),
                img: image,
                dev: owner.username || 'مجهول',
                devImg: owner.profilePicture || '',
                devV: owner.verified || s.verified || false,
                views: s.views || 0,
                likes: s.likeCount || s.likes || 0,
                dislikes: s.dislikeCount || 0,
                key: s.key || false,
                paid: s.scriptType === 'paid',
                mobile: false,
                patched: s.isPatched || false,
                game: gameName,
                gameUrl: gameId ? 'https://roblox.com/games/' + gameId : '',
                code: scriptCode,
                tags: Array.isArray(tags) ? tags : [],
                source: 'bloxscript'
            };
        }

        // ========== FETCH RSCRIPTS ==========
        async function fR() {
            try {
                var u = urlR();
                console.log('Rscripts URL:', u);
                var r = await fetch(u);
                if (!r.ok) throw new Error('Status: ' + r.status);
                var d = await r.json();
                console.log('Rscripts response keys:', Object.keys(d));

                var sc = [];
                // Trending response
                if (d.success && Array.isArray(d.success)) {
                    sc = d.success;
                    S.mR = false; // Trending has no pagination
                }
                // Scripts list response
                else if (d.scripts && Array.isArray(d.scripts)) {
                    sc = d.scripts;
                    var cp = d.info && d.info.currentPage ? d.info.currentPage : S.pR;
                    var mp = d.info && d.info.maxPages ? d.info.maxPages : 1;
                    S.mR = cp < mp;
                }
                console.log('Rscripts count:', sc.length);
                var result = [];
                for (var i = 0; i < sc.length; i++) {
                    result.push(nR(sc[i]));
                }
                return result;
            } catch (e) {
                console.error('Rscripts error:', e.message);
                return [];
            }
        }

        // ========== FETCH BLOXSCRIPT ==========
        async function fB() {
            try {
                var u = urlB();
                console.log('Bloxscript URL:', u);
                var r = await fetch(u);
                if (!r.ok) throw new Error('Status: ' + r.status);
                var d = await r.json();
                console.log('Bloxscript response keys:', Object.keys(d));

                var sc = [];
                // Trending response
                if (d.result && d.result.scripts) {
                    sc = d.result.scripts;
                    var tp = d.result.totalPages || 1;
                    S.mB = S.pB < tp;
                }
                // Other response formats
                else if (d.scripts) {
                    sc = d.scripts;
                    S.mB = false;
                }
                console.log('Bloxscript count:', sc.length);
                var result = [];
                for (var i = 0; i < sc.length; i++) {
                    result.push(nB(sc[i]));
                }
                return result;
            } catch (e) {
                console.error('Bloxscript error:', e.message);
                return [];
            }
        }

        // ========== GET CODE ==========
        var codeCache = {};
        async function getCode(sc) {
            var k = sc.source + '_' + sc.id;
            if (codeCache[k]) return codeCache[k];
            if (sc.code) { codeCache[k] = sc.code; return sc.code; }
            if (sc.source === 'rscripts' && sc.codeUrl) {
                try { var r1 = await fetch(sc.codeUrl); if (r1.ok) { var t = await r1.text(); codeCache[k] = t; return t; } } catch (e) {}
                try { var r2 = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(sc.codeUrl)); if (r2.ok) { var t2 = await r2.text(); codeCache[k] = t2; return t2; } } catch (e) {}
            }
            if (sc.source === 'bloxscript') {
                try { var r3 = await fetch('https://scriptblox.com/api/script/raw/' + sc.id); if (r3.ok) { var t3 = await r3.text(); codeCache[k] = t3; return t3; } } catch (e) {}
            }
            return null;
        }

        // ========== LOCAL FILTER ==========
        function locFil(arr) {
            if (S.f === 'all') return arr;
            return arr.filter(function(s) {
                switch (S.f) {
                    case 'free': return !s.paid && !s.key;
                    case 'nokey': return !s.key;
                    case 'key': return s.key;
                    case 'mobile': return s.mobile;
                    case 'unpatched': return !s.patched;
                    case 'verified': return s.devV;
                    default: return true;
                }
            });
        }

        // ========== MAIN LOAD ==========
        async function load(reset) {
            if (S.busy) return;
            S.busy = true;
            if (reset === undefined) reset = true;

            if (reset) {
                S.pR = 1; S.pB = 1; S.mR = true; S.mB = true; S.scripts = [];
                grid.innerHTML = '';
                for (var i = 0; i < 12; i++) { grid.innerHTML += '<div class="skel"></div>'; }
                btnMore.style.display = 'none';
            }

            btnMore.disabled = true;
            var all = [];

            if (S.src === 'all' || S.src === 'rscripts') {
                var rScripts = await fR();
                console.log('Rscripts loaded:', rScripts.length);
                for (var j = 0; j < rScripts.length; j++) { all.push(rScripts[j]); }
            }

            if (S.src === 'all' || S.src === 'bloxscript') {
                var bScripts = await fB();
                console.log('Bloxscript loaded:', bScripts.length);
                for (var k = 0; k < bScripts.length; k++) { all.push(bScripts[k]); }
            }

            console.log('Total before filter:', all.length);
            all = locFil(all);
            console.log('Total after filter:', all.length);

            // Sort
            if (S.sort === 'views') all.sort(function(a, b) { return b.views - a.views; });
            else if (S.sort === 'likes') all.sort(function(a, b) { return b.likes - a.likes; });

            if (reset) S.scripts = all;
            else { for (var m = 0; m < all.length; m++) { S.scripts.push(all[m]); } }

            // Remove duplicates
            S.scripts = S.scripts.filter(function(s, i, a) {
                return a.findIndex(function(x) { return x.id === s.id && x.source === s.source; }) === i;
            });

            console.log('Final scripts count:', S.scripts.length);
            render();

            var more = S.src === 'all' ? (S.mR || S.mB) : (S.src === 'rscripts' ? S.mR : S.mB);
            btnMore.style.display = more ? 'inline-block' : 'none';
            btnMore.disabled = false;
            statsEl.innerHTML = '✅ تم العثور على <span class="num">' + S.scripts.length + '</span> سكربت';
            S.busy = false;
        }

        // ========== LOAD MORE ==========
        function loadMore() {
            if (S.src === 'all') { if (S.mR) S.pR++; if (S.mB) S.pB++; }
            else if (S.src === 'rscripts') S.pR++;
            else S.pB++;
            load(false);
        }

        // ========== INFINITE SCROLL ==========
        var scrollTimeout;
        window.addEventListener('scroll', function() {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(function() {
                var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                var windowHeight = window.innerHeight;
                var documentHeight = document.documentElement.scrollHeight;
                if (scrollTop + windowHeight >= documentHeight - 600 && !S.busy) {
                    var more = S.src === 'all' ? (S.mR || S.mB) : (S.src === 'rscripts' ? S.mR : S.mB);
                    if (more) loadMore();
                }
            }, 300);
        });

        // ========== RENDER ==========
        function render() {
            if (!S.scripts.length) {
                grid.innerHTML = '<div class="no-results"><div class="icon">🔍</div><p>لا توجد نتائج</p><p style="font-size:0.8rem;">جرب تغيير الفلاتر أو البحث بكلمة مختلفة</p></div>';
                return;
            }

            grid.innerHTML = '';
            for (var i = 0; i < S.scripts.length; i++) {
                var s = S.scripts[i];
                var desc = (s.desc || '').substring(0, 180);
                var hasDesc = desc.length > 8;
                var isEnglish = /^[a-zA-Z]/.test(desc);
                var uid = (s.source + '_' + s.id).replace(/[^a-zA-Z0-9]/g, '_');

                var badgesHtml = '';
                if (s.key) { badgesHtml += '<span class="badge badge-key">🔑 بمفتاح</span>'; }
                else { badgesHtml += '<span class="badge badge-nokey">🔓 بدون مفتاح</span>'; }
                if (s.mobile) { badgesHtml += '<span class="badge badge-mobile">📱 جوال</span>'; }

                var translateBtn = '';
                if (hasDesc && isEnglish) {
                    translateBtn = '<button class="btn-translate" onclick="window._krbTranslate(this,\'' + uid + '\')">🌐 ترجمة الوصف</button>';
                }

                var gameHtml = '';
                if (s.game) {
                    gameHtml = '<div class="card-game">🎮 <a href="' + escHtml(s.gameUrl) + '" target="_blank">' + escHtml(s.game) + '</a></div>';
                }

                var tagsHtml = '';
                if (s.tags && s.tags.length > 0) {
                    tagsHtml = '<div class="card-tags">';
                    for (var t = 0; t < Math.min(s.tags.length, 4); t++) {
                        tagsHtml += '<span class="ctag">#' + escHtml(s.tags[t]) + '</span>';
                    }
                    tagsHtml += '</div>';
                }

                var devVerifiedHtml = s.devV ? '<span class="dev-verified">✅</span>' : '';
                var devImgHtml = s.devImg ? '<img src="' + escHtml(s.devImg) + '" onerror="this.style.display=\'none\'">' : '';
                var sourceLabel = s.source === 'rscripts' ? '📜 Rscripts' : '📦 ScriptBlox';
                var imgHtml = s.img ? '<img src="' + escHtml(s.img) + '" loading="lazy" onerror="this.style.display=\'none\'">' : '';
                var descHtml = hasDesc ? '<div class="card-desc" id="desc-' + uid + '" data-o="' + escHtml(desc) + '">' + escHtml(desc) + '</div>' : '';

                grid.innerHTML +=
                    '<div class="card">' +
                        '<div class="card-img">' + imgHtml +
                            '<div class="card-badges">' + badgesHtml + '</div>' +
                            '<span class="badge badge-source">' + sourceLabel + '</span>' +
                        '</div>' +
                        '<div class="card-body">' +
                            '<div class="card-title">' + escHtml(s.title) + '</div>' +
                            descHtml + translateBtn + gameHtml + tagsHtml +
                            '<div class="card-dev">' + devImgHtml +
                                '<span class="dev-name">' + devVerifiedHtml + escHtml(s.dev) + '</span>' +
                            '</div>' +
                            '<div class="card-stats">' +
                                '<span class="stat-v">👁️ ' + fmtNum(s.views) + '</span>' +
                                '<span class="stat-l">❤️ ' + fmtNum(s.likes) + '</span>' +
                            '</div>' +
                            '<button class="btn-copy" onclick="window._krbCopy(this,\'' + escHtml(s.id) + '\',\'' + s.source + '\')">📋 نسخ السكربت</button>' +
                        '</div>' +
                    '</div>';
            }
        }

        // ========== TRANSLATE DESCRIPTION ==========
        window._krbTranslate = async function(btn, uid) {
            if (btn.disabled) return;
            var el = document.getElementById('desc-' + uid);
            if (!el) return;
            var original = el.getAttribute('data-o') || el.textContent;
            btn.innerHTML = '⏳';
            btn.disabled = true;
            var translated = await toAr(original);
            if (translated && translated !== original) {
                el.textContent = translated;
                el.classList.add('translated');
                btn.innerHTML = '✅';
                btn.classList.add('done');
                showToast('✅ تمت الترجمة');
            } else {
                btn.innerHTML = '⚠️';
                showToast('⚠️ فشل');
            }
            setTimeout(function() {
                btn.innerHTML = btn.classList.contains('done') ? '🔄' : '🌐 ترجمة';
                btn.disabled = false;
            }, 2000);
        };

        // ========== COPY ==========
        window._krbCopy = async function(btn, id, src) {
            if (btn.disabled) return;
            var orig = btn.innerHTML;
            btn.innerHTML = '⏳';
            btn.disabled = true;
            var sc = S.scripts.find(function(s) { return s.id === id && s.source === src; });
            if (!sc) { btn.innerHTML = orig; btn.disabled = false; return; }
            var code = await getCode(sc);
            if (code) {
                try { await navigator.clipboard.writeText(code); btn.innerHTML = '✅ تم النسخ!'; btn.classList.add('copied'); showToast('✅ تم نسخ السكربت!'); }
                catch (e) { btn.innerHTML = '❌'; showToast('❌ فشل'); }
            } else { btn.innerHTML = '❌ لا يوجد كود'; showToast('❌ تعذر التحميل'); }
            setTimeout(function() { btn.innerHTML = orig; btn.classList.remove('copied'); btn.disabled = false; }, 2000);
        };

        // ========== HELPERS ==========
        function escHtml(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function fmtNum(n) { if (!n) return '0'; if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M'; if (n >= 1000) return (n / 1000).toFixed(1) + 'K'; return n.toLocaleString('en'); }
        function showToast(m) { toastEl.textContent = m; toastEl.style.display = 'block'; toastEl.style.animation = 'none'; toastEl.offsetHeight; toastEl.style.animation = 'toastUp 0.3s ease'; setTimeout(function() { toastEl.style.display = 'none'; }, 2200); }

        // ========== EVENTS ==========
        document.getElementById('tabs').addEventListener('click', function(e) {
            var tab = e.target.closest('.tab');
            if (!tab) return;
            document.querySelectorAll('#tabs .tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            S.src = tab.getAttribute('data-src');
            load(true);
        });

        document.getElementById('filtersBar').addEventListener('click', function(e) {
            var btn = e.target.closest('.filter-btn');
            if (!btn) return;
            document.querySelectorAll('#filtersBar .filter-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.f = btn.getAttribute('data-f');
            load(true);
        });

        document.getElementById('sortSelect').addEventListener('change', function(e) {
            S.sort = e.target.value;
            load(true);
        });

        searchInput.addEventListener('input', function(e) {
            clearTimeout(S.timer);
            S.timer = setTimeout(async function() {
                var raw = e.target.value.trim();
                S.qRaw = raw;
                S.qEn = raw ? await toEn(raw) : '';
                load(true);
            }, 600);
        });

        btnMore.addEventListener('click', function() { loadMore(); });

        // ========== INIT ==========
        load(true);
    })();
    </script>
</body>
</html>
