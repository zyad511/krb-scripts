<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRB - مركز السكربتات | KSA Scripts Hub</title>
    <meta name="description" content="KRB - ابحث وانسخ أفضل سكربتات Roblox من Rscripts و ScriptBlox مع ترجمة فورية">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='black'/><rect x='15' y='15' width='70' height='70' rx='15' fill='none' stroke='white' stroke-width='4'/><text x='50' y='68' text-anchor='middle' font-size='45' font-weight='900' fill='white' font-family='Arial'>K</text></svg>">

    <style>
        :root {
            --bg: #000000;
            --bg2: #080808;
            --card: #0f0f0f;
            --card2: #161616;
            --border: #1f1f1f;
            --border2: #2a2a2a;
            --text: #ffffff;
            --text2: #e0e0e0;
            --sub: #888888;
            --sub2: #555555;
            --accent: #ffffff;
            --accent2: #cccccc;
            --gold: #d4af37;
            --gold2: #f0c860;
            --red: #ff3b3b;
            --green: #00e676;
            --blue: #448aff;
            --cyan: #00e5ff;
            --pink: #ff4081;
            --shadow: 0 8px 32px rgba(0,0,0,0.8);
            --glow: 0 0 40px rgba(255,255,255,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.02) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(212,175,55,0.03) 0%, transparent 50%);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--sub2); }

        /* ========== HEADER ========== */
        header {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 0.8rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }
        .header-inner {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            white-space: nowrap;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            border: 2px solid #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            transition: all 0.3s;
        }
        .logo-icon:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: #fff;
        }
        .logo-sub {
            font-size: 0.55rem;
            color: var(--sub2);
            display: block;
            letter-spacing: 3px;
            margin-top: -2px;
        }

        .search-wrap {
            flex: 1;
            min-width: 220px;
            position: relative;
        }
        .search-wrap input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.8rem;
            border-radius: 30px;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 0.92rem;
            transition: all 0.3s;
        }
        .search-wrap input:focus {
            outline: none;
            border-color: var(--accent2);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.03);
            background: var(--card2);
        }
        .search-wrap input::placeholder { color: var(--sub2); }
        .search-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
            color: var(--sub);
        }

        /* ========== TABS ========== */
        .tabs { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .tab {
            padding: 0.45rem 1.1rem;
            border-radius: 25px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--sub);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .tab.active {
            background: #fff;
            border-color: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.15);
        }
        .tab:hover:not(.active) {
            border-color: var(--border2);
            color: #fff;
        }

        /* ========== CONTAINER ========== */
        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* ========== HERO ========== */
        .hero {
            text-align: center;
            padding: 2rem 1rem 1.5rem;
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
        }
        .hero h1 .gold { color: var(--gold); }
        .hero p {
            color: var(--sub);
            font-size: 0.9rem;
        }

        /* ========== FILTERS ========== */
        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
            align-items: center;
            padding: 0.7rem 1rem;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .filter-label {
            font-size: 0.73rem;
            color: var(--sub);
            font-weight: 700;
            margin-left: 0.3rem;
            white-space: nowrap;
        }
        .filter-chip {
            padding: 0.35rem 0.8rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--bg2);
            color: var(--sub);
            cursor: pointer;
            font-size: 0.73rem;
            font-weight: 600;
            transition: all 0.25s;
            white-space: nowrap;
            user-select: none;
        }
        .filter-chip.active {
            background: #fff;
            border-color: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .filter-chip:hover:not(.active) {
            border-color: var(--border2);
            color: #fff;
        }
        .sort-select {
            margin-right: auto;
            padding: 0.35rem 0.8rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-size: 0.73rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }
        .sort-select:hover { border-color: var(--border2); }
        .sort-select option { background: #111; color: #fff; }

        /* ========== RESULTS ========== */
        .results-info {
            margin-bottom: 1rem;
            font-size: 0.82rem;
            color: var(--sub);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .results-info .count {
            background: #fff;
            color: #000;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.78rem;
        }

        /* ========== GRID ========== */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        /* ========== CARD ========== */
        .card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border2);
            box-shadow: 0 12px 40px rgba(255,255,255,0.05);
        }

        .card-img-wrap {
            position: relative;
            width: 100%;
            height: 165px;
            background: #050505;
            overflow: hidden;
        }
        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .card:hover .card-img-wrap img {
            transform: scale(1.05);
        }

        .card-badges {
            position: absolute;
            top: 8px;
            left: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            z-index: 2;
        }
        .badge {
            padding: 3px 9px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #fff;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .badge-key { background: rgba(255,59,59,0.85); }
        .badge-free { background: rgba(0,230,118,0.85); color: #000; }
        .badge-paid { background: rgba(212,175,55,0.85); color: #000; }
        .badge-mobile { background: rgba(68,138,255,0.85); }
        .badge-patched { background: rgba(150,150,150,0.8); }
        .badge-source {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.85);
            font-size: 0.6rem;
            z-index: 2;
            padding: 2px 7px;
            border-radius: 6px;
        }
        .badge-verified {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(68,138,255,0.85);
            font-size: 0.6rem;
            z-index: 2;
            padding: 2px 7px;
            border-radius: 6px;
        }

        .card-body {
            padding: 0.9rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            position: relative;
            z-index: 2;
            background: var(--card);
        }
        .card-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }
        .card-desc {
            font-size: 0.76rem;
            color: var(--sub);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
            transition: all 0.3s;
        }
        .card-desc.translated {
            color: #d4d4d4;
            border-right: 2px solid var(--gold);
            padding-right: 0.5rem;
        }

        .btn-translate {
            font-size: 0.67rem;
            padding: 3px 10px;
            border-radius: 10px;
            border: 1px solid var(--border2);
            background: rgba(255,255,255,0.02);
            color: var(--sub);
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 600;
            align-self: flex-start;
        }
        .btn-translate:hover {
            background: rgba(255,255,255,0.06);
            border-color: #fff;
            color: #fff;
        }
        .btn-translate:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-translate.done {
            background: rgba(0,230,118,0.1);
            border-color: var(--green);
            color: var(--green);
        }

        .card-game {
            font-size: 0.74rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .card-game a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .card-game a:hover { color: #fff; text-decoration: underline; }

        .card-dev {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }
        .card-dev img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border2);
            transition: border-color 0.3s;
        }
        .card:hover .card-dev img { border-color: #fff; }
        .card-dev .dev-name {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text2);
        }
        .dev-verified { color: var(--blue); margin-right: 2px; }

        .card-stats {
            display: flex;
            gap: 0.8rem;
            font-size: 0.74rem;
            color: var(--sub);
        }
        .card-stats span { display: flex; align-items: center; gap: 3px; }
        .stat-views { color: var(--cyan); }
        .stat-likes { color: var(--pink); }
        .stat-dislikes { color: var(--sub2); }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }
        .tag {
            font-size: 0.62rem;
            padding: 2px 7px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            color: var(--sub2);
            border: 1px solid var(--border);
        }

        .btn-copy {
            width: 100%;
            padding: 0.65rem;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.83rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            margin-top: auto;
            letter-spacing: 0.3px;
        }
        .btn-copy:hover {
            background: #e0e0e0;
            box-shadow: 0 4px 20px rgba(255,255,255,0.15);
        }
        .btn-copy:active { transform: scale(0.97); }
        .btn-copy.copied { background: var(--green) !important; color: #000; }
        .btn-copy:disabled { opacity: 0.5; cursor: not-allowed; background: #444; }

        /* ========== LOAD MORE ========== */
        .load-more-wrap {
            text-align: center;
            margin: 2.5rem 0;
        }
        .btn-load-more {
            padding: 0.75rem 2.8rem;
            border-radius: 30px;
            border: 2px solid #fff;
            background: transparent;
            color: #fff;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.35s;
            letter-spacing: 0.5px;
        }
        .btn-load-more:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 6px 30px rgba(255,255,255,0.2);
        }
        .btn-load-more:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #333;
            color: #555;
        }

        /* ========== SKELETON ========== */
        .skeleton {
            background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 14px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skel-card { height: 400px; }

        /* ========== TOAST ========== */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
        }
        .toast {
            background: #fff;
            color: #000;
            padding: 0.65rem 1.5rem;
            border-radius: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            animation: toastIn 0.35s ease;
            font-size: 0.82rem;
            font-weight: 700;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ========== FOOTER ========== */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.75rem;
            color: var(--sub2);
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        footer a {
            color: var(--accent2);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        footer a:hover { color: #fff; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 900px) {
            .scripts-grid { grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); }
            .card-img-wrap { height: 150px; }
            .hero h1 { font-size: 1.6rem; }
        }
        @media (max-width: 680px) {
            .header-inner { flex-direction: column; align-items: stretch; }
            .search-wrap { min-width: auto; }
            .scripts-grid { grid-template-columns: 1fr; }
            .tabs { justify-content: center; }
            .filters-bar { justify-content: center; }
            .sort-select { margin-right: 0; }
            .hero { padding: 1rem 0.5rem; }
            .hero h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header>
        <div class="header-inner">
            <div class="logo-wrap">
                <div class="logo-icon">K</div>
                <div>
                    <div class="logo-text">KRB</div>
                    <span class="logo-sub">SCRIPTS HUB</span>
                </div>
            </div>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="ابحث عن سكربت... (Blox Fruits, MM2, قتال...)" autocomplete="off">
            </div>
            <div class="tabs" id="sourceTabs">
                <button class="tab active" data-source="all">🌐 الكل</button>
                <button class="tab" data-source="rscripts">📜 Rscripts</button>
                <button class="tab" data-source="bloxscript">📦 ScriptBlox</button>
            </div>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <h1>مركز <span class="gold">السكربتات</span> الأول</h1>
            <p>ابحث وانسخ أفضل سكربتات Roblox مع ترجمة فورية للوصف</p>
        </div>

        <!-- Filters -->
        <div class="filters-bar" id="filtersBar">
            <span class="filter-label">🎯 فلترة:</span>
            <button class="filter-chip active" data-filter="all">✨ الكل</button>
            <button class="filter-chip" data-filter="free">🆓 مجاني</button>
            <button class="filter-chip" data-filter="nokey">🔓 بدون مفتاح</button>
            <button class="filter-chip" data-filter="key">🔑 بمفتاح</button>
            <button class="filter-chip" data-filter="verified">☑️ موثق</button>
            <button class="filter-chip" data-filter="mobile">📱 جوال</button>
            <button class="filter-chip" data-filter="unpatched">🟢 يعمل</button>
            <select class="sort-select" id="sortSelect">
                <option value="default">🔥 الأكثر تداولاً</option>
                <option value="newest">📅 الأحدث</option>
                <option value="views">👁️ الأكثر مشاهدة</option>
                <option value="likes">❤️ الأكثر إعجاباً</option>
            </select>
        </div>

        <!-- Results -->
        <div class="results-info" id="resultsInfo">
            ⏳ جاري تحميل السكربتات...
        </div>

        <!-- Grid -->
        <div class="scripts-grid" id="scriptsGrid">
            <div class="skeleton skel-card"></div>
            <div class="skeleton skel-card"></div>
            <div class="skeleton skel-card"></div>
            <div class="skeleton skel-card"></div>
            <div class="skeleton skel-card"></div>
            <div class="skeleton skel-card"></div>
        </div>

        <!-- Load More -->
        <div class="load-more-wrap">
            <button class="btn-load-more" id="btnLoadMore" style="display:none;">
                📥 تحميل المزيد...
            </button>
        </div>
    </div>

    <!-- ==================== FOOTER ==================== -->
    <footer>
        <p><strong style="color:#fff;">KRB</strong> — مركز السكربتات | Powered by 
           <a href="https://scriptblox.com" target="_blank" rel="noopener">ScriptBlox</a> &amp; 
           <a href="https://rscripts.net" target="_blank" rel="noopener">Rscripts</a>
        </p>
        <p style="margin-top:0.5rem;">© 2025 KRB Scripts Hub - جميع الحقوق محفوظة</p>
    </footer>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ==================== SCRIPTS ENGINE ==================== -->
    <script>
    (function() {
        // ============ STATE ============
        const state = {
            source: 'all',
            filter: 'all',
            sort: 'default',
            search: '',
            searchEnglish: '',
            page: { rscripts: 1, bloxscript: 1 },
            maxPages: { rscripts: 1, bloxscript: 1 },
            isLoading: false,
            hasMore: { rscripts: true, bloxscript: true },
            allScripts: [],
            searchTimer: null,
            codeCache: {},
            translateCache: {}
        };

        // ============ DOM ============
        const $grid = document.getElementById('scriptsGrid');
        const $search = document.getElementById('searchInput');
        const $resultsInfo = document.getElementById('resultsInfo');
        const $btnLoadMore = document.getElementById('btnLoadMore');
        const $toastContainer = document.getElementById('toastContainer');

        // ============ API ============
        const API = {
            rscripts: 'https://rscripts.net/api/v2',
            bloxscript: 'https://scriptblox.com/api'
        };

        // CORS proxy for Rscripts raw scripts
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

        // ============ ARABIC TO ENGLISH SEARCH MAP ============
        const arabicSearchMap = {
            'بلوكس': 'blox',
            'فروت': 'fruit',
            'فواكه': 'fruit',
            'قتال': 'fight',
            'سيف': 'sword',
            'سكربت': 'script',
            'هاك': 'hack',
            'اختراق': 'hack',
            'لعبه': 'game',
            'لعبة': 'game',
            'قيم': 'game',
            'سيم': 'sim',
            'محاكي': 'simulator',
            'مفتاح': 'key',
            'مجاني': 'free',
            'جوال': 'mobile',
            'قوي': 'op',
            'كون': 'kun',
            'ون بيس': 'one piece',
            'ناروتو': 'naruto',
            'تحديث': 'update',
            'جديد': 'new',
            'افضل': 'best',
            'توب': 'top',
            'سول': 'soul',
            'ريبر': 'reaper',
            'انمي': 'anime',
            'قتال': 'combat',
            'سحر': 'magic',
            'قدرات': 'abilities',
            'سلاح': 'weapon',
            'بيتي': 'pet',
            'بت': 'pet',
            'عملاق': 'giant',
            'تنين': 'dragon',
            'شيطان': 'demon',
            'صياد': 'hunter',
            'بحر': 'sea',
            'جزيرة': 'island',
            'مدينة': 'city',
        };

        function translateArabicToEnglish(text) {
            if (!text) return '';
            let result = text.toLowerCase().trim();
            // Replace Arabic words with English
            for (const [arabic, english] of Object.entries(arabicSearchMap)) {
                const regex = new RegExp(arabic, 'gi');
                result = result.replace(regex, english);
            }
            // Remove any remaining Arabic characters
            result = result.replace(/[\u0600-\u06FF]/g, ' ').replace(/\s+/g, ' ').trim();
            return result;
        }

        function hasArabic(text) {
            return /[\u0600-\u06FF]/.test(text);
        }

        // ============ TRANSLATION ============
        async function translateGoogle(text, targetLang = 'ar') {
            if (!text || text.length < 3) return text;
            const cacheKey = `tr_${text.substring(0, 60)}`;
            if (state.translateCache[cacheKey]) return state.translateCache[cacheKey];
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Translate failed');
                const data = await res.json();
                let translated = data?.[0]?.map(part => part[0]).join('') || text;
                if (translated !== text) {
                    state.translateCache[cacheKey] = translated;
                }
                return translated;
            } catch {
                return text;
            }
        }

        // ============ URL BUILDERS ============
        function buildRscriptsURL(isTrending) {
            if (isTrending && !state.searchEnglish) return `${API.rscripts}/trending`;
            const p = new URLSearchParams();
            p.set('page', state.page.rscripts.toString());
            p.set('sort', 'desc');
            if (state.sort === 'newest') p.set('orderBy', 'date');
            else if (state.sort === 'views') p.set('orderBy', 'views');
            else if (state.sort === 'likes') p.set('orderBy', 'likes');
            else p.set('orderBy', 'date');
            if (state.searchEnglish) p.set('q', state.searchEnglish);
            if (state.filter === 'nokey') p.set('noKeySystem', 'true');
            if (state.filter === 'mobile') p.set('mobileOnly', 'true');
            if (state.filter === 'free') p.set('notPaid', 'true');
            if (state.filter === 'unpatched') p.set('unpatched', 'true');
            if (state.filter === 'verified') p.set('verifiedOnly', 'true');
            return `${API.rscripts}/scripts?${p.toString()}`;
        }

        function buildBloxscriptURL(isTrending) {
            if (isTrending && !state.searchEnglish) return `${API.bloxscript}/script/trending`;
            const isSearch = !!state.searchEnglish;
            const endpoint = isSearch ? '/script/search' : '/script/fetch';
            const p = new URLSearchParams();
            p.set('page', state.page.bloxscript.toString());
            p.set('max', '20');
            if (isSearch) p.set('q', state.searchEnglish);
            if (state.sort === 'newest') { p.set('sortBy', 'createdAt'); p.set('order', 'desc'); }
            else if (state.sort === 'views') { p.set('sortBy', 'views'); p.set('order', 'desc'); }
            else if (state.sort === 'likes') { p.set('sortBy', 'likeCount'); p.set('order', 'desc'); }
            if (state.filter === 'free') p.set('mode', 'free');
            if (state.filter === 'nokey') p.set('key', '0');
            if (state.filter === 'key') p.set('key', '1');
            if (state.filter === 'verified') p.set('verified', '1');
            if (state.filter === 'unpatched') p.set('patched', '0');
            return `${API.bloxscript}${endpoint}?${p.toString()}`;
        }

        // ============ FETCHERS ============
        async function fetchRscripts(isTrending) {
            try {
                const url = buildRscriptsURL(isTrending);
                const res = await fetch(url);
                if (!res.ok) throw new Error(`Rscripts Status ${res.status}`);
                const data = await res.json();
                let scripts = [];
                if (isTrending && !state.searchEnglish) {
                    if (data.success && Array.isArray(data.success)) scripts = data.success;
                    else if (Array.isArray(data)) scripts = data;
                } else {
                    if (data.scripts && Array.isArray(data.scripts)) scripts = data.scripts;
                }
                state.maxPages.rscripts = data.info?.maxPages || 1;
                state.hasMore.rscripts = state.page.rscripts < state.maxPages.rscripts;
                return scripts.map(s => normalizeRscript(s));
            } catch (e) {
                console.error('Rscripts fetch error:', e.message);
                return [];
            }
        }

        async function fetchBloxscript(isTrending) {
            try {
                const url = buildBloxscriptURL(isTrending);
                const res = await fetch(url);
                if (!res.ok) throw new Error(`Bloxscript Status ${res.status}`);
                const data = await res.json();
                const scripts = data.result?.scripts || [];
                state.maxPages.bloxscript = data.result?.totalPages || 1;
                state.hasMore.bloxscript = state.page.bloxscript < state.maxPages.bloxscript;
                return scripts.map(s => normalizeBloxscript(s));
            } catch (e) {
                console.error('Bloxscript fetch error:', e.message);
                return [];
            }
        }

        // ============ NORMALIZERS ============
        function normalizeRscript(s) {
            const hasUser = s.user && Object.keys(s.user).length > 0;
            return {
                id: s._id || s.id || '',
                title: s.title || 'بدون عنوان',
                description: (s.description || '').trim(),
                image: s.image || s.game?.imgurl || '',
                dev: hasUser ? (s.user.username || '') : (s.creator || 'مجهول'),
                devImg: hasUser ? (s.user.image || '') : '',
                devVerified: hasUser ? (s.user.verified || false) : false,
                views: s.views || 0,
                likes: s.likes || 0,
                dislikes: s.dislikes || 0,
                hasKey: s.keySystem || false,
                isPaid: s.paid || false,
                isMobile: s.mobileReady || false,
                isPatched: false,
                isUniversal: false,
                gameName: s.game?.title || '',
                gameId: s.game?.placeId || null,
                gameLink: s.game?.gameLink || (s.game?.placeId ? `https://www.roblox.com/games/${s.game.placeId}` : '#'),
                codeUrl: s.rawScript || null,
                code: null,
                tags: [],
                source: 'rscripts',
                slug: s._id || s.id || ''
            };
        }

        function normalizeBloxscript(s) {
            return {
                id: s._id || '',
                title: s.title || 'بدون عنوان',
                description: (s.features || '').trim(),
                image: s.image || s.game?.imageUrl || '',
                dev: s.owner?.username || 'مجهول',
                devImg: s.owner?.profilePicture || '',
                devVerified: s.owner?.verified || s.verified || false,
                views: s.views || 0,
                likes: s.likeCount || 0,
                dislikes: s.dislikeCount || 0,
                hasKey: s.key || false,
                isPaid: s.scriptType === 'paid',
                isMobile: false,
                isPatched: s.isPatched || false,
                isUniversal: s.isUniversal || false,
                gameName: s.game?.name || '',
                gameId: s.game?.gameId || null,
                gameLink: s.game?.gameId ? `https://www.roblox.com/games/${s.game.gameId}` : '#',
                codeUrl: null,
                code: s.script || null,
                tags: Array.isArray(s.tags) ? s.tags : [],
                source: 'bloxscript',
                slug: s.slug || s._id || ''
            };
        }

        // ============ GET CODE ============
        async function getCode(script) {
            const cacheKey = `code_${script.source}_${script.id}`;
            if (state.codeCache[cacheKey]) return state.codeCache[cacheKey];
            if (script.code) { state.codeCache[cacheKey] = script.code; return script.code; }

            if (script.source === 'rscripts' && script.codeUrl) {
                try {
                    const r = await fetch(script.codeUrl);
                    if (r.ok) { const txt = await r.text(); state.codeCache[cacheKey] = txt; return txt; }
                } catch {}
                try {
                    const r = await fetch(CORS_PROXY + encodeURIComponent(script.codeUrl));
                    if (r.ok) { const txt = await r.text(); state.codeCache[cacheKey] = txt; return txt; }
                } catch {}
            }

            if (script.source === 'bloxscript') {
                try {
                    const r = await fetch(`${API.bloxscript}/script/raw/${script.id}`);
                    if (r.ok) { const txt = await r.text(); state.codeCache[cacheKey] = txt; return txt; }
                } catch {}
            }
            return null;
        }

        // ============ MAIN LOAD ============
        async function loadScripts(reset = true) {
            if (state.isLoading) return;
            state.isLoading = true;

            if (reset) {
                state.page.rscripts = 1;
                state.page.bloxscript = 1;
                state.hasMore.rscripts = true;
                state.hasMore.bloxscript = true;
                state.allScripts = [];
                $grid.innerHTML = Array(6).fill(0).map(() => '<div class="skeleton skel-card"></div>').join('');
                $btnLoadMore.style.display = 'none';
            }

            $btnLoadMore.disabled = true;
            const isTrending = state.sort === 'default' && !state.searchEnglish;
            let scripts = [];

            const promises = [];
            if (state.source === 'all' || state.source === 'rscripts') {
                promises.push(fetchRscripts(isTrending).then(s => scripts.push(...s)));
            }
            if (state.source === 'all' || state.source === 'bloxscript') {
                promises.push(fetchBloxscript(isTrending).then(s => scripts.push(...s)));
            }

            await Promise.allSettled(promises);

            // Apply local filter
            scripts = applyLocalFilter(scripts);

            // Sort
            if (state.sort === 'views') scripts.sort((a, b) => b.views - a.views);
            else if (state.sort === 'likes') scripts.sort((a, b) => b.likes - a.likes);

            if (reset) {
                state.allScripts = scripts;
            } else {
                state.allScripts = [...state.allScripts, ...scripts];
            }

            // Remove duplicates
            state.allScripts = state.allScripts.filter((s, i, a) =>
                a.findIndex(x => x.id === s.id && x.source === s.source) === i
            );

            render(state.allScripts);

            const hasMore = state.source === 'all'
                ? (state.hasMore.rscripts || state.hasMore.bloxscript)
                : (state.source === 'rscripts' ? state.hasMore.rscripts : state.hasMore.bloxscript);

            $btnLoadMore.style.display = hasMore ? 'inline-block' : 'none';
            $btnLoadMore.disabled = false;
            $resultsInfo.innerHTML = `✅ تم العثور على <span class="count">${state.allScripts.length}</span> سكربت`;
            state.isLoading = false;
        }

        function applyLocalFilter(scripts) {
            if (state.filter === 'all') return scripts;
            return scripts.filter(s => {
                switch (state.filter) {
                    case 'free': return !s.isPaid;
                    case 'nokey': return !s.hasKey;
                    case 'key': return s.hasKey;
                    case 'verified': return s.devVerified;
                    case 'mobile': return s.isMobile;
                    case 'unpatched': return !s.isPatched;
                    default: return true;
                }
            });
        }

        function loadMore() {
            if (state.source === 'all') {
                if (state.hasMore.rscripts) state.page.rscripts++;
                if (state.hasMore.bloxscript) state.page.bloxscript++;
            } else if (state.source === 'rscripts') {
                state.page.rscripts++;
            } else {
                state.page.bloxscript++;
            }
            loadScripts(false);
        }

        // ============ RENDER ============
        function render(scripts) {
            if (!scripts.length) {
                $grid.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--sub);">
                    <div style="font-size:3rem;margin-bottom:1rem;">🔍</div>
                    <p style="font-size:1.1rem;font-weight:600;">لا توجد نتائج</p>
                    <p style="font-size:0.85rem;margin-top:0.3rem;">جرب تغيير الفلاتر أو كلمة البحث</p>
                </div>`;
                return;
            }

            $grid.innerHTML = scripts.map(s => {
                const desc = s.description?.substring(0, 200) || '';
                const hasDesc = desc.length > 10;
                const isEnglish = /^[a-zA-Z]/.test(desc);
                const uniqueId = `${s.id}_${s.source}`.replace(/[^a-zA-Z0-9]/g, '_');

                const translateBtn = hasDesc && isEnglish
                    ? `<button class="btn-translate" data-desc-id="${uniqueId}" onclick="window._krbTranslate(this, '${uniqueId}')">🌐 ترجمة</button>`
                    : '';

                const badgesHtml = [
                    s.hasKey ? '<span class="badge badge-key">🔑 مفتاح</span>' : '<span class="badge badge-free">✅ مفتوح</span>',
                    s.isPaid ? '<span class="badge badge-paid">💎 مدفوع</span>' : '',
                    s.isMobile ? '<span class="badge badge-mobile">📱 جوال</span>' : '',
                    s.isPatched ? '<span class="badge badge-patched">🚫 متوقف</span>' : '',
                ].filter(Boolean).join('');

                const devNameHtml = s.devVerified
                    ? `<span class="dev-verified">✅</span>${escHtml(s.dev)}`
                    : escHtml(s.dev);

                const statsHtml = [
                    `<span class="stat-views">👁️ ${fmtNum(s.views)}</span>`,
                    `<span class="stat-likes">❤️ ${fmtNum(s.likes)}</span>`,
                    s.dislikes > 0 ? `<span class="stat-dislikes">👎 ${fmtNum(s.dislikes)}</span>` : '',
                ].filter(Boolean).join('');

                const sourceLabel = s.source === 'rscripts' ? '📜 Rscripts' : '📦 ScriptBlox';
                const tagsHtml = s.tags.slice(0, 4).map(t => `<span class="tag">#${escHtml(t)}</span>`).join('');

                return `
                <div class="card">
                    <div class="card-img-wrap">
                        ${s.image ? `<img src="${escHtml(s.image)}" alt="${escHtml(s.title)}" loading="lazy" onerror="this.parentElement.style.background='#050505';this.style.display='none';">` : ''}
                        <div class="card-badges">${badgesHtml}</div>
                        <span class="badge badge-source">${sourceLabel}</span>
                        ${s.devVerified ? '<span class="badge badge-verified">☑️ مطور موثق</span>' : ''}
                    </div>
                    <div class="card-body">
                        <div class="card-title">${escHtml(s.title)}</div>
                        ${hasDesc ? `<div class="card-desc" id="desc-${uniqueId}" data-original="${escHtml(desc)}">${escHtml(desc)}</div>` : ''}
                        ${translateBtn}
                        ${s.gameName ? `<div class="card-game">🎮 <a href="${escHtml(s.gameLink)}" target="_blank" rel="noopener">${escHtml(s.gameName)}</a></div>` : ''}
                        ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
                        <div class="card-dev">
                            ${s.devImg ? `<img src="${escHtml(s.devImg)}" alt="${escHtml(s.dev)}" loading="lazy" onerror="this.style.display='none';">` : ''}
                            <span class="dev-name">${devNameHtml}</span>
                        </div>
                        <div class="card-stats">${statsHtml}</div>
                        <button class="btn-copy" data-script-id="${escHtml(s.id)}" data-script-source="${s.source}" onclick="window._krbCopy(this)">
                            📋 نسخ السكربت
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        // ============ TRANSLATE FUNCTION ============
        window._krbTranslate = async function(btn, uniqueId) {
            if (btn.disabled) return;
            const descEl = document.getElementById(`desc-${uniqueId}`);
            if (!descEl) return;
            const originalText = descEl.dataset.original || descEl.textContent;

            btn.innerHTML = '⏳ جاري الترجمة...';
            btn.disabled = true;

            const translated = await translateGoogle(originalText, 'ar');

            if (translated && translated !== originalText) {
                descEl.textContent = translated;
                descEl.classList.add('translated');
                btn.innerHTML = '✅ تمت الترجمة';
                btn.classList.add('done');
                showToast('✅ تمت ترجمة الوصف');
            } else {
                btn.innerHTML = '⚠️ تعذرت الترجمة';
                showToast('⚠️ لم نتمكن من ترجمة الوصف');
            }

            setTimeout(() => {
                if (btn.classList.contains('done')) {
                    btn.innerHTML = '🔄 إعادة الترجمة';
                } else {
                    btn.innerHTML = '🌐 ترجمة';
                }
                btn.disabled = false;
            }, 2000);
        };

        // ============ COPY FUNCTION ============
        window._krbCopy = async function(btn) {
            if (btn.disabled) return;
            const id = btn.dataset.scriptId;
            const source = btn.dataset.scriptSource;
            const origHTML = btn.innerHTML;
            btn.innerHTML = '⏳ جاري التحميل...';
            btn.disabled = true;

            const script = state.allScripts.find(s => s.id === id && s.source === source);
            if (!script) {
                btn.innerHTML = origHTML;
                btn.disabled = false;
                return;
            }

            const code = await getCode(script);
            if (code) {
                try {
                    await navigator.clipboard.writeText(code);
                    btn.innerHTML = '✅ تم النسخ!';
                    btn.classList.add('copied');
                    showToast('✅ تم نسخ كود السكربت بنجاح!');
                } catch {
                    btn.innerHTML = '❌ فشل النسخ';
                    showToast('❌ تعذر الوصول للحافظة');
                }
            } else {
                btn.innerHTML = '❌ لم يتم العثور على الكود';
                showToast('❌ تعذر تحميل كود السكربت');
            }

            setTimeout(() => {
                btn.innerHTML = origHTML;
                btn.classList.remove('copied');
                btn.disabled = false;
            }, 2200);
        };

        // ============ HELPERS ============
        function escHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function fmtNum(n) {
            if (!n || n === 0) return '0';
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toLocaleString('en');
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            $toastContainer.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transition = 'opacity 0.3s';
                setTimeout(() => t.remove(), 300);
            }, 2300);
        }

        // ============ EVENT LISTENERS ============
        document.getElementById('sourceTabs').addEventListener('click', e => {
            const tab = e.target.closest('.tab');
            if (!tab) return;
            document.querySelectorAll('#sourceTabs .tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            state.source = tab.dataset.source;
            loadScripts(true);
        });

        document.getElementById('filtersBar').addEventListener('click', e => {
            const chip = e.target.closest('.filter-chip');
            if (!chip) return;
            document.querySelectorAll('#filtersBar .filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            state.filter = chip.dataset.filter;
            loadScripts(true);
        });

        document.getElementById('sortSelect').addEventListener('change', e => {
            state.sort = e.target.value;
            loadScripts(true);
        });

        $search.addEventListener('input', e => {
            clearTimeout(state.searchTimer);
            state.searchTimer = setTimeout(() => {
                const rawSearch = e.target.value.trim();
                state.search = rawSearch;

                if (hasArabic(rawSearch)) {
                    state.searchEnglish = translateArabicToEnglish(rawSearch);
                } else {
                    state.searchEnglish = rawSearch;
                }

                loadScripts(true);
            }, 500);
        });

        $btnLoadMore.addEventListener('click', () => loadMore());

        // ============ INIT ============
        loadScripts(true);
    })();
    </script>
</body>
</html>
